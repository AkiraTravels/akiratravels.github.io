<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div id="country-wrap" class="country-wrap" style="display: none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display: none;">
      <img id="cover-photo" alt="代表写真">
    </div>
    
    <div class="post-chain" id="post-chain"></div>
    
    <hr class="footer-rule">
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                        this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display: none;"></div>

  <div id="detail-view" class="detail-view" style="display: none;">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let countryId = null;
    let countryData = null;
    let allPosts = [];
    let currentIdx = null;
    let ioInstance = null;

    async function init() {
      // 著作権年の設定
      const currentYear = new Date().getFullYear();
      const cpText = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
      document.getElementById('copyright-text').textContent = cpText;
      document.getElementById('detail-copyright').textContent = cpText;

      // 基点状態の履歴登録（ブラウザバック制御用）
      history.replaceState({ detail: false }, '', location.href);

      // クエリパラメータの解析
      const params = new URLSearchParams(location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        // 1. 国データの取得 (sessionStorage優先)
        const countryKey = `country_${countryId}`;
        const cachedCountry = sessionStorage.getItem(countryKey);
        if (cachedCountry) {
          countryData = JSON.parse(cachedCountry);
        } else {
          const countrySnap = await getDoc(doc(db, 'countries', countryId));
          if (!countrySnap.exists()) {
            showError('指定された国データが見つかりません。');
            return;
          }
          countryData = countrySnap.data();
          sessionStorage.setItem(countryKey, JSON.stringify(countryData));
        }

        // 2. 投稿データの取得 (sessionStorage優先)
        const postsKey = `posts_${countryId}`;
        const cachedPosts = sessionStorage.getItem(postsKey);
        if (cachedPosts) {
          allPosts = JSON.parse(cachedPosts);
        } else {
          const q = query(collection(db, 'posts'), where('countryId', '==', countryId), orderBy('date', 'asc'));
          const querySnapshot = await getDocs(q);
          querySnapshot.forEach((d) => {
            allPosts.push({ id: d.id, ...d.data() });
          });
          sessionStorage.setItem(postsKey, JSON.stringify(allPosts));
        }

        // 3. 画面描画
        document.title = `${countryData.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = countryData.name;
        document.getElementById('country-description').textContent = countryData.description || '';

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto();
        renderChain();

      } catch (error) {
        console.error(error);
        showError('データの読み込みに失敗しました。');
      }
    }

    // 代表写真のレンダリング
    function renderCoverPhoto() {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      if (countryData.imgUrl) {
        img.src = countryData.imgUrl;
        wrap.style.display = 'block';
        img.onclick = () => openDetail(0);
      }
    }

    // 投稿チェーンのレンダリング
    function renderChain() {
      const container = document.getElementById('post-chain');
      if (allPosts.length === 0) {
        container.innerHTML = '<div class="loading">投稿がありません</div>';
        return;
      }

      allPosts.forEach((post, i) => {
        const item = document.createElement('div');
        item.className = 'chain-item';

        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(i);
        item.appendChild(link);
        container.appendChild(item);

        // 隣接セパレーターの挿入ロジック
        if (i < allPosts.length - 1) {
          const nextPost = allPosts[i + 1];
          const diffDays = Math.abs(new Date(nextPost.date) - new Date(post.date)) / (1000 * 60 * 60 * 24);

          if (diffDays < 7) {
            const arrowItem = document.createElement('div');
            arrowItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            arrowItem.appendChild(arrow);
            container.appendChild(arrowItem);
          } else {
            const sepItem = document.createElement('div');
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
            container.appendChild(sepItem);
          }
        }
      });
    }

    // 詳細表示
    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // 詳細を閉じる
    function closeDetail() {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
    }

    // 詳細コンテンツ生成
    function renderDetail(idx) {
      const post = allPosts[idx];
      
      // スティッキーバー
      document.getElementById('detail-title').textContent = post.title;
      const metaArr = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaArr.join(' · ');

      // キャプション
      const captionEl = document.getElementById('detail-caption');
      captionEl.textContent = post.caption || '';
      
      // メメディアリスト初期化
      const mediaList = document.getElementById('detail-media-list');
      mediaList.innerHTML = '';

      if (post.media && post.media.length > 0) {
        let imgIndex = 0;
        post.media.forEach((m) => {
          const item = document.createElement('div');
          item.className = 'media-item';

          if (m.type === 'video') {
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = "metadata";

            // Poster URL生成変換ロジック
            if (m.url.includes('upload/')) {
              const parts = m.url.split('upload/');
              const partA = parts[0] + 'upload/';
              const partB = parts[1].replace(/\.mp4$/i, '.webp');
              video.poster = `${partA}so_0/l_play_muwwou/${partB}`;
            }

            video.onclick = () => {
              if (video.paused) {
                pauseOtherVideos(video);
                video.play();
              } else {
                video.pause();
              }
            };

            video.addEventListener('ended', () => {
              video.pause();
              video.currentTime = 0;
              video.load(); // posterへ完全復帰
            });

            item.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || '';
            // 画像のみのカウントで3枚目以降に lazy 適用
            if (imgIndex >= 2) {
              img.loading = 'lazy';
            }
            imgIndex++;
            item.appendChild(img);
          }

          // 個別キャプション or スペーサー
          const capDiv = document.createElement('div');
          if (m.caption) {
            capDiv.className = 'media-caption';
            capDiv.textContent = m.caption;
          } else {
            capDiv.style.height = '2em';
          }
          item.appendChild(capDiv);
          mediaList.appendChild(item);
        });
      }

      setupVideoExitPause();
      renderDetailFooter(idx);
    }

    // 視野外動画一時停止
    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
      }
      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            const vid = entry.target;
            if (!vid.paused) {
              vid.pause();
            }
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    // 他の動画を停止する
    function pauseOtherVideos(targetVid) {
      document.querySelectorAll('#detail-media-list video').forEach(v => {
        if (v === targetVid) return;
        v.pause();
      });
    }

    // すべての動画を初期状態に戻す
    function stopAllVideos() {
      document.querySelectorAll('#detail-media-list video').forEach(v => {
        v.pause();
        v.currentTime = 0;
        v.load();
      });
    }

    // 詳細用フッターナビゲーション
    function renderDetailFooter(idx) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 既存の古いhrがあれば削除して再挿入（重複防止）
      const existingHr = document.querySelector('.detail-body hr.footer-rule');
      if (existingHr) existingHr.remove();

      const hr = document.createElement('hr');
      hr.className = 'footer-rule';
      document.querySelector('.detail-body').appendChild(hr);

      // 1. 次へボタン
      if (idx < allPosts.length - 1) {
        const aNext = document.createElement('a');
        const imgNext = document.createElement('img');
        imgNext.src = 'https://akiratravels.github.io/images/i_next.gif';
        imgNext.alt = '次へ';
        imgNext.onerror = () => {
          imgNext.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateDetail(idx + 1);
          aNext.appendChild(btn);
        };
        imgNext.onclick = () => navigateDetail(idx + 1);
        aNext.appendChild(imgNext);
        footer.appendChild(aNext);
      }

      // 2. HOMEボタン
      const aHome = document.createElement('a');
      const imgHome = document.createElement('img');
      imgHome.src = 'https://akiratravels.github.io/images/i_home.gif';
      imgHome.alt = 'HOME';
      imgHome.onerror = () => {
        imgHome.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 HOME';
        btn.onclick = () => location.href = 'index.html';
        aHome.appendChild(btn);
      };
      imgHome.onclick = () => location.href = 'index.html';
      aHome.appendChild(imgHome);
      footer.appendChild(aHome);

      // 3. 戻るボタン
      const aLast = document.createElement('a');
      const imgLast = document.createElement('img');
      imgLast.src = 'https://akiratravels.github.io/images/i_last.gif';
      imgLast.alt = '戻る';
      imgLast.onerror = () => {
        imgLast.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        aLast.appendChild(btn);
      };
      imgLast.onclick = () => closeDetail();
      aLast.appendChild(imgLast);
      footer.appendChild(aLast);
    }

    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // SPEC19 ブラウザバック制御ディスパッチ
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.detail === true) {
        document.getElementById('country-wrap').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        currentIdx = event.state.idx;
        renderDetail(event.state.idx);
      } else if (event.state && event.state.detail === false) {
        // 詳細画面が開いていれば閉じ、一律トップページへ遷移
        const detailOpen = document.getElementById('detail-view').style.display === 'block';
        if (detailOpen) {
          closeDetail();
        }
        location.replace('index.html');
      } else {
        location.replace('index.html');
      }
    });

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
