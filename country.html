<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div id="country-wrap" class="country-wrap" style="display: none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display: none;">
      <img id="cover-photo" alt="代表写真">
    </div>
    
    <div class="post-chain" id="post-chain"></div>
    
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                        this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">データを読み込んでいます…</div>
  
  <div id="error-msg" class="error-msg" style="display: none;"></div>

  <div id="detail-view" class="detail-view" style="display: none;">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // モジュールレベル変数の管理
    let countryId = null;
    let currentIdx = null;
    let ioInstance = null;

    // 初期化処理
    async function init() {
      // 著作権年度の設定
      const currentYear = new Date().getFullYear();
      const copyrightString = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
      document.getElementById('copyright-text').textContent = copyrightString;
      document.getElementById('detail-copyright').textContent = copyrightString;

      // クエリパラメータの取得
      const params = new URLSearchParams(window.location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        await loadData();
        
        // セッションからデータ展開
        const country = JSON.parse(sessionStorage.getItem(`country_${countryId}`));
        document.title = `${country.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = country.name;
        document.getElementById('country-description').textContent = country.description || '';

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto(country);
        renderChain();
        
        // 初回の履歴状態をセット（ブラウザバック制御用）
        if (!history.state) {
          history.replaceState({ detail: false }, '', window.location.href);
        }
      } catch (err) {
        console.error(err);
        showError('データの読み込みに失敗しました。');
      }
    }

    // データの取得とsessionStorage保存
    async function loadData() {
      const countryKey = `country_${countryId}`;
      const postsKey = `posts_${countryId}`;

      // 国データの取得
      if (!sessionStorage.getItem(countryKey)) {
        const countryDoc = await getDoc(doc(db, 'countries', countryId));
        if (!countryDoc.exists()) {
          throw new Error('Country not found');
        }
        sessionStorage.setItem(countryKey, JSON.stringify({ id: countryDoc.id, ...countryDoc.data() }));
      }

      // 投稿一覧の取得（date昇順）
      if (!sessionStorage.getItem(postsKey)) {
        const q = query(collection(db, 'posts'), where('countryId', '==', countryId), orderBy('date', 'asc'));
        const querySnapshot = await getDocs(q);
        const posts = [];
        querySnapshot.forEach((doc) => {
          posts.push({ id: doc.id, ...doc.data() });
        });
        sessionStorage.setItem(postsKey, JSON.stringify(posts));
      }
    }

    // 代表写真の描画
    function renderCoverPhoto(country) {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      if (country.imgUrl) {
        img.src = country.imgUrl;
        wrap.style.display = 'block';
        img.onclick = () => openDetail(0);
      } else {
        wrap.style.display = 'none';
      }
    }

    // 投稿チェーンの描画
    function renderChain() {
      const container = document.getElementById('post-chain');
      container.innerHTML = '';
      const posts = JSON.parse(sessionStorage.getItem(`posts_${countryId}`)) || [];

      if (posts.length === 0) {
        container.innerHTML = '<div class="loading">投稿がありません</div>';
        return;
      }

      posts.forEach((post, i) => {
        // 投稿要素の作成
        const item = document.createElement('div');
        item.className = 'chain-item';
        
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(i);
        
        item.appendChild(link);
        container.appendChild(item);

        // 隣接投稿とのセパレーター判定（最後の投稿を除く）
        if (i < posts.length - 1) {
          const nextPost = posts[i + 1];
          const dateA = new Date(post.date);
          const dateB = new Date(nextPost.date);
          const diffDays = Math.abs(dateB - dateA) / (1000 * 60 * 60 * 24);

          const sepItem = document.createElement('div');
          if (diffDays < 7) {
            sepItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            sepItem.appendChild(arrow);
          } else {
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
          }
          container.appendChild(sepItem);
        }
      });
    }

    // 詳細表示画面を開く
    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', window.location.href);
    }

    // 詳細表示画面を閉じる
    function closeDetail() {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
    }

    // 詳細画面内のページ遷移
    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', window.location.href);
    }

    // 該当インデックスの詳細データ描画
    function renderDetail(idx) {
      const posts = JSON.parse(sessionStorage.getItem(`posts_${countryId}`)) || [];
      const post = posts[idx];
      if (!post) return;

      // スティッキーバー設定
      document.getElementById('detail-title').textContent = post.title;
      const metaArray = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaArray.join(' · ');

      // キャプション設定（末尾に2行分の改行を追加、横棒はなし）
      const captionEl = document.getElementById('detail-caption');
      if (post.caption) {
        captionEl.textContent = post.caption + '\n\n';
        captionEl.style.display = 'block';
      } else {
        captionEl.textContent = '';
        captionEl.style.display = 'none';
      }

      // メディアリストの構築
      const mediaContainer = document.getElementById('detail-media-list');
      mediaContainer.innerHTML = '';

      if (post.media && post.media.length > 0) {
        post.media.forEach((m) => {
          const mediaItem = document.createElement('div');
          mediaItem.className = 'media-item';

          if (m.type === 'video') {
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = 'metadata';
            
            // Cloudinary仕様に沿った動的poster変換ロジック
            if (m.url.includes('upload/')) {
              const parts = m.url.split('upload/');
              const partA = parts[0] + 'upload/';
              const partB = parts[1];
              const targetB = partB.replace(/\.[^.]+$/, '.webp');
              video.poster = `${partA}so_0.1/l_play_muwwou/${targetB}`;
            }

            // クリック時の一時停止・再生制御
            video.onclick = () => {
              if (video.paused) {
                stopAllVideos();
                video.play();
              } else {
                video.pause();
              }
            };

            // 終了時処理（完全リセット）
            video.onended = () => {
              video.pause();
              video.currentTime = 0;
              video.load();
            };

            mediaItem.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || '';
            img.loading = 'lazy';
            mediaItem.appendChild(img);
          }

          // 個別キャプションまたはスペーサーの配備
          if (m.caption) {
            const capDiv = document.createElement('div');
            capDiv.className = 'media-caption';
            capDiv.textContent = m.caption;
            mediaItem.appendChild(capDiv);
          } else {
            const spacer = document.createElement('div');
            spacer.style.height = '2em';
            mediaItem.appendChild(spacer);
          }

          mediaContainer.appendChild(mediaItem);
        });
      }

      setupVideoExitPause();
      renderDetailFooter(idx, posts.length);
    }

    // 動画の視野外一時停止
    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }

      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            const video = entry.target;
            if (!video.paused) {
              video.pause();
            }
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    // 全動画の一時停止と完全初期状態リセット
    function stopAllVideos() {
      const videos = document.querySelectorAll('#detail-media-list video');
      videos.forEach((vid) => {
        vid.pause();
        vid.currentTime = 0;
        vid.load(); // posterサムネイルの再描画を担保
      });
    }

    // 詳細フッターボタン群の動的生成
    function renderDetailFooter(idx, totalCount) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 1. 次へ ボタン (インデックスが最後以外の場合のみ)
      if (idx < totalCount - 1) {
        const nextA = document.createElement('a');
        nextA.title = '次へ';
        const nextImg = document.createElement('img');
        nextImg.src = 'https://akiratravels.github.io/images/i_next.gif';
        nextImg.alt = '次へ';
        nextImg.onerror = () => {
          nextImg.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateDetail(idx + 1);
          nextA.appendChild(btn);
        };
        nextImg.onclick = () => navigateDetail(idx + 1);
        nextA.appendChild(nextImg);
        footer.appendChild(nextA);
      }

      // 2. HOME ボタン (常に表示)
      const homeA = document.createElement('a');
      homeA.title = 'HOME';
      const homeImg = document.createElement('img');
      homeImg.src = 'https://akiratravels.github.io/images/i_home.gif';
      homeImg.alt = 'HOME';
      homeImg.onerror = () => {
        homeImg.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 HOME';
        btn.onclick = () => location.href = 'index.html';
        homeA.appendChild(btn);
      };
      homeImg.onclick = () => location.href = 'index.html';
      homeA.appendChild(homeImg);
      footer.appendChild(homeA);

      // 3. 戻る ボタン (常に表示)
      const backA = document.createElement('a');
      backA.title = '戻る';
      const backImg = document.createElement('img');
      backImg.src = 'https://akiratravels.github.io/images/i_last.gif';
      backImg.alt = '戻る';
      backImg.onerror = () => {
        backImg.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        backA.appendChild(btn);
      };
      backImg.onclick = () => closeDetail();
      backA.appendChild(backImg);
      footer.appendChild(backA);
    }

    // エラーメッセージの描画
    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    // ブラウザバック・履歴制御のイベント検知
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.detail === true) {
        // 詳細画面の復元とコンテンツ書き換え
        document.getElementById('country-wrap').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        currentIdx = event.state.idx;
        renderDetail(event.state.idx);
      } else {
        // 国一覧・通常チェーン画面へ戻す
        closeDetail();
      }
    });

    // 初期実行
    init();
  </script>
</body>
</html>
