<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div id="country-wrap" class="country-wrap" style="display: none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display: none;">
      <img id="cover-photo" alt="代表写真">
    </div>
    
    <div class="post-chain" id="post-chain"></div>
    
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'; this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="country-copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display: none;"></div>

  <div id="detail-view" class="detail-view" style="display: none;">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // モジュールレベルの状態管理変数
    let countryId = null;
    let currentCountry = null;
    let allPosts = [];
    let currentIdx = null;
    let ioInstance = null;

    // 初期化処理
    async function init() {
      // 著作権年の設定
      const currentYear = new Date().getFullYear();
      const copyrightString = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
      document.getElementById('country-copyright-text').textContent = copyrightString;
      document.getElementById('detail-copyright').textContent = copyrightString;

      // クエリパラメータから国IDを取得
      const params = new URLSearchParams(location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        // 1. 国データの取得（セッションキャッシュ優先）
        const cacheCountryKey = `country_${countryId}`;
        const cachedCountry = sessionStorage.getItem(cacheCountryKey);
        if (cachedCountry) {
          currentCountry = JSON.parse(cachedCountry);
        } else {
          const countryDoc = await getDoc(doc(db, 'countries', countryId));
          if (!countryDoc.exists()) {
            showError('指定された国データが見つかりません。');
            return;
          }
          currentCountry = countryDoc.data();
          sessionStorage.setItem(cacheCountryKey, JSON.stringify(currentCountry));
        }

        // 2. 投稿データの取得（セッションキャッシュ優先）
        const cachePostsKey = `posts_${countryId}`;
        const cachedPosts = sessionStorage.getItem(cachePostsKey);
        if (cachedPosts) {
          allPosts = JSON.parse(cachedPosts);
        } else {
          const postsQuery = query(collection(db, 'posts'), where('countryId', '==', countryId));
          const querySnapshot = await getDocs(postsQuery);
          const tempPosts = [];
          querySnapshot.forEach((doc) => {
            tempPosts.push({ id: doc.id, ...doc.data() });
          });
          // 日付の昇順でソート
          tempPosts.sort((a, b) => a.date.localeCompare(b.date));
          allPosts = tempPosts;
          sessionStorage.setItem(cachePostsKey, JSON.stringify(allPosts));
        }

        // 3. 画面の初期レンダリング
        document.title = `${currentCountry.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = currentCountry.name;
        document.getElementById('country-description').textContent = currentCountry.description || '';

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto();
        renderChain();

        // 履歴スタックの初期状態を設定
        if (!history.state) {
          history.replaceState({ detail: false }, '', location.href);
        }

      } catch (error) {
        console.error(error);
        showError('データの取得中にエラーが発生しました。');
      }
    }

    // 代表写真のレンダリング
    function renderCoverPhoto() {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      if (currentCountry && currentCountry.imgUrl) {
        img.src = currentCountry.imgUrl;
        wrap.style.display = 'block';
        img.onclick = () => openDetail(0);
      } else {
        wrap.style.display = 'none';
      }
    }

    // 投稿チェーン（タイムライン一覧）のレンダリング
    function renderChain() {
      const container = document.getElementById('post-chain');
      container.innerHTML = '';

      if (allPosts.length === 0) {
        container.innerHTML = '<div class="loading">投稿がありません</div>';
        return;
      }

      allPosts.forEach((post, idx) => {
        // 投稿リンクアイテムの生成
        const item = document.createElement('div');
        item.className = 'chain-item';
        
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(idx);
        
        item.appendChild(link);
        container.appendChild(item);

        // 次の投稿がある場合、日付差に応じたセパレーターを挿入
        if (idx < allPosts.length - 1) {
          const nextPost = allPosts[idx + 1];
          const dateA = new Date(post.date);
          const dateB = new Date(nextPost.date);
          const diffDays = Math.abs(dateB - dateA) / (1000 * 60 * 60 * 24);

          const sepItem = document.createElement('div');
          if (diffDays < 7) {
            sepItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            sepItem.appendChild(arrow);
          } else {
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
          }
          container.appendChild(sepItem);
        }
      });
    }

    // 詳細画面を開く
    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // 詳細画面を閉じる（国別画面へ戻る）
    function closeDetail() {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
    }

    // 詳細画面内でのページ切り替え
    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // 詳細画面の動的構築
    function renderDetail(idx) {
      const post = allPosts[idx];
      
      // スティッキーバーの設定
      document.getElementById('detail-title').textContent = post.title;
      const metaArray = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaArray.join(' · ');

      // キャプションの設定
      const captionContainer = document.getElementById('detail-caption');
      if (post.caption) {
        captionContainer.textContent = post.caption;
        captionContainer.style.display = 'block';
      } else {
        captionContainer.textContent = '';
        captionContainer.style.display = 'none';
      }

      // メディアリストの生成
      const mediaListContainer = document.getElementById('detail-media-list');
      mediaListContainer.innerHTML = '';

      if (post.media && Array.isArray(post.media)) {
        post.media.forEach((m) => {
          const mediaItem = document.createElement('div');
          mediaItem.className = 'media-item';

          if (m.type === 'video') {
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = 'metadata';
            
            // Cloudinary動画の再生成ポスターURLルール適用
            if (m.url.includes('upload/')) {
              const parts = m.url.split('upload/');
              const partA = parts[0] + 'upload/';
              const partB = parts[1].replace(/\.[^/.]+$/, '.webp'); // 拡張子をwebpへ
              video.poster = `${partA}so_0.1/l_play_muwwou/${partB}`;
            }

            // クリック時の一時停止・再生制御
            video.onclick = () => {
              if (video.paused) {
                stopAllVideos();
                video.play();
              } else {
                video.pause();
              }
            };

            // 動画終了時は初期状態（ポスター表示）に巻き戻す
            video.onended = () => {
              video.pause();
              video.currentTime = 0;
              video.load();
            };

            mediaItem.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || post.title;
            img.loading = 'lazy';
            mediaItem.appendChild(img);
          }

          // メディア別個別キャプション、または下部スペーサーの配置
          if (m.caption) {
            const medCap = document.createElement('div');
            medCap.className = 'media-caption';
            medCap.textContent = m.caption;
            mediaItem.appendChild(medCap);
          } else {
            const spacer = document.createElement('div');
            spacer.style.height = '2em';
            mediaItem.appendChild(spacer);
          }

          mediaListContainer.appendChild(mediaItem);
        });
      }

      // 動画の視界外監視を初期化・再設定
      setupVideoExitPause();

      // ナビゲーションフッターボタンの生成
      renderDetailFooter(idx);
    }

    // 詳細画面ナビゲーションボタン群の制御
    function renderDetailFooter(idx) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 1. 「次へ」ボタン (インデックスが登録数未満の場合のみ)
      if (idx < allPosts.length - 1) {
        const aNext = document.createElement('a');
        const imgNext = document.createElement('img');
        imgNext.src = 'https://akiratravels.github.io/images/i_next.gif';
        imgNext.alt = '次へ';
        imgNext.onerror = () => {
          imgNext.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateDetail(idx + 1);
          aNext.appendChild(btn);
        };
        imgNext.onclick = () => navigateDetail(idx + 1);
        aNext.appendChild(imgNext);
        footer.appendChild(aNext);
      }

      // 2. 「HOME」ボタン (常に配置)
      const aHome = document.createElement('a');
      const imgHome = document.createElement('img');
      imgHome.src = 'https://akiratravels.github.io/images/i_home.gif';
      imgHome.alt = 'HOME';
      imgHome.onerror = () => {
        imgHome.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 TOP';
        btn.onclick = () => location.href = 'index.html';
        aHome.appendChild(btn);
      };
      imgHome.onclick = () => location.href = 'index.html';
      aHome.appendChild(imgHome);
      footer.appendChild(aHome);

      // 3. 「戻る」ボタン (常に配置)
      const aLast = document.createElement('a');
      const imgLast = document.createElement('img');
      imgLast.src = 'https://akiratravels.github.io/images/i_last.gif';
      imgLast.alt = '戻る';
      imgLast.onerror = () => {
        imgLast.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        aLast.appendChild(btn);
      };
      imgLast.onclick = () => closeDetail();
      aLast.appendChild(imgLast);
      footer.appendChild(aLast);
    }

    // 全動画の一時停止および初期化（ポスター再表示）処理
    function stopAllVideos() {
      const videos = document.querySelectorAll('#detail-media-list video');
      videos.forEach((vid) => {
        vid.pause();
        vid.currentTime = 0;
        vid.load(); // 再生履歴をクリアしポスターを再表示させる
      });
    }

    // IntersectionObserverを用いた動画の視野外一時停止制御
    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }

      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          // 60%未満の視界（スクロールアウト）になった場合
          if (!entry.isIntersecting) {
            const video = entry.target;
            if (!video.paused) {
              video.pause();
              video.currentTime = 0;
              video.load(); // 視野外に外れたら再生状態を完全解除してポスターに戻す
            }
          }
        });
      }, { threshold: 0.6 });

      videos.forEach((vid) => ioInstance.observe(vid));
    }

    // エラー表示処理
    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    // ブラウザバック・フォワード（popstate）対応
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.detail === true) {
        // 詳細表示状態への移動
        document.getElementById('country-wrap').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        currentIdx = event.state.idx;
        renderDetail(event.state.idx);
      } else {
        // 国一覧・メイン表示状態への移動
        if (document.getElementById('detail-view').style.display === 'block') {
          closeDetail();
        }
      }
    });

    // 起動
    init();
  </script>
</body>
</html>
