<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="stylesheet" href="css/style.css">
  <style>body { background-attachment: local; }</style>
</head>
<body class="country-page">

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" src="" alt="">
    </div>
    <div class="post-chain" id="post-chain"></div>
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img
            src="https://akiratravels.github.io/images/i_home.gif"
            alt="AKIRA travels"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'; this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <!-- 詳細画面 -->
  <div id="detail-view" class="detail-view">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      collection, getDocs, getDoc,
      doc, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── 状態 ───────────────────────────────────────────
    let allPosts   = [];
    let currentIdx = 0;
    let ioInstance = null;

    // ─── 初期化 ─────────────────────────────────────────
    const params     = new URLSearchParams(location.search);
    const countryId  = params.get('id');

    if (!countryId) {
      showError('国IDが指定されていません。');
    } else {
      init();
    }

    async function init() {
      try {
        // country データ取得（sessionStorage キャッシュ）
        let country;
        const cachedCountry = sessionStorage.getItem(`country_${countryId}`);
        if (cachedCountry) {
          country = JSON.parse(cachedCountry);
        } else {
          const snap = await getDoc(doc(db, 'countries', countryId));
          if (!snap.exists()) { showError('国データが見つかりませんでした。'); return; }
          country = { id: snap.id, ...snap.data() };
          sessionStorage.setItem(`country_${countryId}`, JSON.stringify(country));
        }

        // posts データ取得（sessionStorage キャッシュ）
        const cachedPosts = sessionStorage.getItem(`posts_${countryId}`);
        if (cachedPosts) {
          allPosts = JSON.parse(cachedPosts);
        } else {
          const q    = query(collection(db, 'posts'), orderBy('date', 'asc'));
          const snap = await getDocs(q);
          allPosts   = snap.docs
            .filter(d => d.data().countryId === countryId)
            .map(d => ({ id: d.id, ...d.data() }));
          sessionStorage.setItem(`posts_${countryId}`, JSON.stringify(allPosts));
        }

        // タイトル・ヘッダー描画
        document.title = `${country.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = country.name;
        if (country.description) {
          document.getElementById('country-description').textContent = country.description;
        }

        // 著作権
        const yr = new Date().getFullYear();
        document.getElementById('copyright-text').textContent =
          `© 1998–${yr} AKIRA travels. All rights reserved.`;

        // 表示切り替え
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = '';

        renderCoverPhoto(country);
        renderChain();

      } catch (e) {
        console.error(e);
        showError('データの取得に失敗しました。');
      }
    }

    // ─── 代表写真 ────────────────────────────────────────
    function renderCoverPhoto(country) {
      if (!country.imgUrl) return;
      const wrap  = document.getElementById('cover-photo-wrap');
      const photo = document.getElementById('cover-photo');
      photo.src    = country.imgUrl;
      photo.alt    = country.name;
      wrap.style.display = '';
      photo.addEventListener('click', () => openDetail(0));
    }

    // ─── 投稿チェーン ────────────────────────────────────
    function renderChain() {
      const chain = document.getElementById('post-chain');
      chain.innerHTML = '';
      if (!allPosts.length) {
        chain.textContent = '投稿がありません';
        return;
      }
      allPosts.forEach((post, i) => {
        // タイトルアイテム
        const item = document.createElement('div');
        item.className = 'chain-item';
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.addEventListener('click', () => openDetail(i));
        item.appendChild(link);
        chain.appendChild(item);

        // セパレーター（最後を除く）
        if (i < allPosts.length - 1) {
          const nextPost = allPosts[i + 1];
          const diffDays = Math.abs(
            new Date(nextPost.date) - new Date(post.date)
          ) / (1000 * 60 * 60 * 24);

          if (diffDays < 7) {
            const sep = document.createElement('div');
            sep.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            sep.appendChild(arrow);
            chain.appendChild(sep);
          } else {
            const sepWrap = document.createElement('div');
            sepWrap.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepWrap.appendChild(hr);
            chain.appendChild(sepWrap);
          }
        }
      });
    }

    // ─── 詳細画面：開く / 閉じる ─────────────────────────
    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display  = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    function closeDetail() {
      document.getElementById('detail-view').style.display  = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
    }

    // ブラウザバック対応
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.detail === true) {
        document.getElementById('detail-view').style.display  = 'block';
        document.getElementById('country-wrap').style.display = 'none';
        currentIdx = event.state.idx;
        renderDetail(event.state.idx);
      } else {
        if (document.getElementById('detail-view').style.display !== 'none') {
          closeDetail();
        }
      }
    });

    // ─── 詳細画面：描画 ──────────────────────────────────
    function renderDetail(idx) {
      const post = allPosts[idx];

      // スティッキーバー
      document.getElementById('detail-title').textContent = post.title;
      document.getElementById('detail-meta').textContent  =
        [post.date, post.location].filter(Boolean).join(' · ');

      // キャプション
      const captionEl = document.getElementById('detail-caption');
      captionEl.textContent = post.caption
        ? post.caption + '\n\n'
        : '';

      // メディアリスト
      const mediaList = document.getElementById('detail-media-list');
      mediaList.innerHTML = '';

      (post.media || []).forEach(m => {
        const item = document.createElement('div');
        item.className = 'media-item';

        if (m.type === 'video') {
          // poster URL 生成
          const parts     = m.url.split('upload/');
          const posterUrl = parts[0] + 'upload/so_0/l_play_muwwou/' +
            parts[1].replace(/\.mp4$/i, '.webp');

          // video 要素
          const vid = document.createElement('video');
          vid.src         = m.url;
          vid.playsInline = true;
          vid.preload     = 'metadata';
          vid.poster      = posterUrl;

          // オーバーレイ（SPEC18）
          const overlay = document.createElement('div');
          overlay.className = 'video-overlay';
          overlay.style.backgroundImage = `url(${posterUrl})`;

          // クリックハンドラ
          vid.addEventListener('click', () => {
            if (!vid.paused) {
              stopAllVideos();
            } else {
              stopAllVideos();
              overlay.style.display = 'none';
              vid.play();
            }
          });
          overlay.addEventListener('click', () => {
            stopAllVideos();
            overlay.style.display = 'none';
            vid.play();
          });

          vid.addEventListener('play',  () => { overlay.style.display = 'none'; });
          vid.addEventListener('pause', () => { overlay.style.display = ''; });
          vid.addEventListener('ended', () => {
            vid.currentTime = 0;
            overlay.style.display = '';
          });

          item.appendChild(vid);
          item.appendChild(overlay);

        } else {
          // 画像
          const img = document.createElement('img');
          img.src     = m.url;
          img.alt     = m.caption || '';
          img.loading = 'lazy';
          item.appendChild(img);
        }

        // キャプション or スペーサー
        if (m.caption) {
          const cap = document.createElement('div');
          cap.className   = 'media-caption';
          cap.textContent = m.caption;
          item.appendChild(cap);
        } else {
          const spacer = document.createElement('div');
          spacer.style.height = '2em';
          item.appendChild(spacer);
        }

        mediaList.appendChild(item);
      });

      setupVideoExitPause();
      renderDetailFooter(idx);

      // 著作権
      const yr = new Date().getFullYear();
      document.getElementById('detail-copyright').textContent =
        `© 1998–${yr} AKIRA travels. All rights reserved.`;
    }

    // ─── 動画の視野外一時停止（SPEC18） ──────────────────
    function setupVideoExitPause() {
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
      const videos = document.querySelectorAll('#detail-media-list video');
      if (!videos.length) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting && !entry.target.paused) {
            entry.target.pause();
            entry.target.currentTime = 0;
            const overlay = entry.target.nextElementSibling;
            if (overlay) overlay.style.display = '';
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    // ─── stopAllVideos（SPEC18） ──────────────────────────
    function stopAllVideos() {
      document.querySelectorAll('#detail-media-list video').forEach(vid => {
        vid.pause();
        vid.currentTime = 0;
        const overlay = vid.nextElementSibling;
        if (overlay) overlay.style.display = '';
      });
    }

    // ─── 詳細フッター ────────────────────────────────────
    function renderDetailFooter(idx) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 次へ
      if (idx < allPosts.length - 1) {
        const a = document.createElement('a');
        a.style.cursor = 'pointer';
        const img = document.createElement('img');
        img.src = 'https://akiratravels.github.io/images/i_next.gif';
        img.alt = '次へ';
        img.onerror = function() {
          this.style.display = 'none';
          fallbackBtn.style.display = '';
        };
        const fallbackBtn = document.createElement('button');
        fallbackBtn.className   = 'detail-footer-btn';
        fallbackBtn.textContent = '次へ ▶';
        fallbackBtn.style.display = 'none';
        a.appendChild(img);
        a.appendChild(fallbackBtn);
        a.addEventListener('click', () => navigateDetail(idx + 1));
        footer.appendChild(a);
      }

      // HOME
      const homeA = document.createElement('a');
      homeA.style.cursor = 'pointer';
      const homeImg = document.createElement('img');
      homeImg.src = 'https://akiratravels.github.io/images/i_home.gif';
      homeImg.alt = 'HOME';
      const homeFallback = document.createElement('button');
      homeFallback.className   = 'detail-footer-btn';
      homeFallback.textContent = '🏠 HOME';
      homeFallback.style.display = 'none';
      homeImg.onerror = function() {
        this.style.display = 'none';
        homeFallback.style.display = '';
      };
      homeA.appendChild(homeImg);
      homeA.appendChild(homeFallback);
      homeA.addEventListener('click', () => location.href = 'index.html');
      footer.appendChild(homeA);

      // 戻る
      const backA = document.createElement('a');
      backA.style.cursor = 'pointer';
      const backImg = document.createElement('img');
      backImg.src = 'https://akiratravels.github.io/images/i_last.gif';
      backImg.alt = '戻る';
      const backFallback = document.createElement('button');
      backFallback.className   = 'detail-footer-btn';
      backFallback.textContent = '◀ 戻る';
      backFallback.style.display = 'none';
      backImg.onerror = function() {
        this.style.display = 'none';
        backFallback.style.display = '';
      };
      backA.appendChild(backImg);
      backA.appendChild(backFallback);
      backA.addEventListener('click', closeDetail);
      footer.appendChild(backA);
    }

    // ─── 詳細ページ内ナビゲーション ──────────────────────
    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // ─── エラー表示 ───────────────────────────────────────
    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.textContent    = msg;
      el.style.display  = '';
    }
  </script>
</body>
</html>
