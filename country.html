<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OGP -->
  <meta property="og:url"       content="https://akiratravels.github.io/country.html">
  <meta property="og:type"      content="website">
  <meta property="og:title"     content="AKIRA travels">
  <meta property="og:site_name" content="AKIRA travels">
  <meta property="og:image"     content="https://akiratravels.github.io/images/ogp.jpg">

  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">

  <!-- Firebase SDK 先読み -->
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">

  <link rel="stylesheet" href="css/style.css">
  <style>body { background-attachment: local; }</style>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      doc, getDoc, collection, getDocs, query, where, orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ─── スコープ変数 ──────────────────────────────────────────
    let allPosts    = [];
    let currentIdx  = 0;
    let ioInstance  = null;
    let isDetailOpen = false;  // SPEC20: 詳細画面が現在表示中かどうか

    // ─── history 基点登録（データ取得より前） ────────────────
    history.replaceState({ detail: false }, '', location.href);

    // ─── popstate ハンドラ（SPEC20 修正版） ──────────────────
    window.addEventListener('popstate', () => {
      if (isDetailOpen) {
        // 詳細画面が表示中 → 国別ページへ戻す
        isDetailOpen = false;
        closeDetail();
      } else {
        // 国別ページが表示中 → トップへ移動
        location.replace('index.html');
      }
    });

    // ─── ユーティリティ ──────────────────────────────────────
    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = '';
    }

    function stopAllVideos() {
      document.querySelectorAll('#detail-media-list video').forEach(v => {
        v.pause();
        v.currentTime = 0;
        v.load();
      });
    }

    function pauseOtherVideos(targetVid) {
      document.querySelectorAll('#detail-media-list video').forEach(v => {
        if (v === targetVid) return;
        v.pause();
      });
    }

    // ─── 動画 poster URL 生成 ─────────────────────────────────
    function buildPosterUrl(videoUrl) {
      const idx = videoUrl.indexOf('upload/');
      if (idx === -1) return '';
      const partA = videoUrl.slice(0, idx + 'upload/'.length);
      const partB = videoUrl.slice(idx + 'upload/'.length);
      return partA + 'so_0/l_play_muwwou/' + partB.replace(/\.mp4$/i, '.webp');
    }

    // ─── 視野外一時停止 ──────────────────────────────────────
    function setupVideoExitPause() {
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
      const videos = document.querySelectorAll('#detail-media-list video');
      if (!videos.length) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const vid = entry.target;
          if (!entry.isIntersecting && !vid.paused) {
            vid.pause();
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    // ─── 詳細画面フッター描画 ────────────────────────────────
    function renderDetailFooter(idx) {
      // .detail-body 末尾に hr を挿入
      const detailBody = document.querySelector('.detail-body');
      const existingHr = detailBody.querySelector('hr.footer-rule');
      if (existingHr) existingHr.remove();
      const hr = document.createElement('hr');
      hr.className = 'footer-rule';
      detailBody.appendChild(hr);

      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 1. 次へ（次の投稿がある場合のみ）
      if (idx < allPosts.length - 1) {
        const imgNext = document.createElement('img');
        imgNext.src = 'https://akiratravels.github.io/images/i_next.gif';
        imgNext.alt = '次へ';
        imgNext.style.cursor = 'pointer';
        imgNext.onclick = () => navigateDetail(idx + 1);
        const btnNext = document.createElement('button');
        btnNext.className = 'detail-footer-btn';
        btnNext.textContent = '次へ ▶';
        btnNext.style.display = 'none';
        btnNext.onclick = () => navigateDetail(idx + 1);
        imgNext.onerror = () => {
          imgNext.style.display = 'none';
          btnNext.style.display = '';
        };
        footer.appendChild(imgNext);
        footer.appendChild(btnNext);
      }

      // 2. HOME（常に表示）
      const imgHome = document.createElement('img');
      imgHome.src = 'https://akiratravels.github.io/images/i_home.gif';
      imgHome.alt = 'AKIRA travels';
      imgHome.style.cursor = 'pointer';
      imgHome.onclick = () => { location.href = 'index.html'; };
      const btnHome = document.createElement('button');
      btnHome.className = 'detail-footer-btn';
      btnHome.textContent = '🏠 HOME';
      btnHome.style.display = 'none';
      btnHome.onclick = () => { location.href = 'index.html'; };
      imgHome.onerror = () => {
        imgHome.style.display = 'none';
        btnHome.style.display = '';
      };
      footer.appendChild(imgHome);
      footer.appendChild(btnHome);

      // 3. 戻る（常に表示）
      const imgLast = document.createElement('img');
      imgLast.src = 'https://akiratravels.github.io/images/i_last.gif';
      imgLast.alt = '戻る';
      imgLast.style.cursor = 'pointer';
      imgLast.onclick = () => closeDetail();
      const btnLast = document.createElement('button');
      btnLast.className = 'detail-footer-btn';
      btnLast.textContent = '◀ 戻る';
      btnLast.style.display = 'none';
      btnLast.onclick = () => closeDetail();
      imgLast.onerror = () => {
        imgLast.style.display = 'none';
        btnLast.style.display = '';
      };
      footer.appendChild(imgLast);
      footer.appendChild(btnLast);
    }

    // ─── 詳細画面描画 ────────────────────────────────────────
    function renderDetail(idx) {
      const post = allPosts[idx];

      // 1. スティッキーバー
      document.getElementById('detail-title').textContent = post.title;
      document.getElementById('detail-meta').textContent =
        [post.date, post.location].filter(Boolean).join(' · ');

      // 2. キャプション
      const captionEl = document.getElementById('detail-caption');
      captionEl.textContent = (post.caption || '') + '\n\n';

      // 3. メディアリスト
      const mediaList = document.getElementById('detail-media-list');
      mediaList.innerHTML = '';
      let imgIndex = 0;

      (post.media || []).forEach(m => {
        const item = document.createElement('div');
        item.className = 'media-item';

        if (m.type === 'video') {
          const vid = document.createElement('video');
          vid.src = m.url;
          vid.playsInline = true;
          vid.preload = 'metadata';
          vid.poster = buildPosterUrl(m.url);
          vid.onclick = () => {
            if (vid.paused) {
              pauseOtherVideos(vid);
              vid.play();
            } else {
              vid.pause();
            }
          };
          vid.addEventListener('ended', () => { vid.load(); });
          item.appendChild(vid);
        } else {
          // type === 'image'
          const img = document.createElement('img');
          img.src = m.url;
          img.alt = m.caption || '';
          if (imgIndex >= 2) img.loading = 'lazy';
          imgIndex++;
          item.appendChild(img);
        }

        // キャプション or スペーサー
        if (m.caption) {
          const cap = document.createElement('div');
          cap.className = 'media-caption';
          cap.textContent = m.caption;
          item.appendChild(cap);
        } else {
          const spacer = document.createElement('div');
          spacer.style.height = '2em';
          item.appendChild(spacer);
        }

        mediaList.appendChild(item);
      });

      // 4. 視野外一時停止
      setupVideoExitPause();

      // 5. フッター
      renderDetailFooter(idx);

      // 6. 著作権
      document.getElementById('detail-copyright').textContent =
        `© 1998–${new Date().getFullYear()} A.Mizui All rights reserved.`;
    }

    // ─── 詳細画面を開く ──────────────────────────────────────
    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      isDetailOpen = true;   // SPEC20
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // ─── 詳細画面を閉じる ────────────────────────────────────
    function closeDetail() {
      isDetailOpen = false;  // SPEC20（手順1の直前）
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
    }

    // ─── 詳細画面内ページ遷移 ───────────────────────────────
    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    // ─── 代表写真 ────────────────────────────────────────────
    function renderCoverPhoto(country) {
      if (!country.imgUrl) return;
      const wrap  = document.getElementById('cover-photo-wrap');
      const photo = document.getElementById('cover-photo');
      photo.src = country.imgUrl;
      photo.alt = country.name;
      photo.onclick = () => openDetail(0);
      wrap.style.display = '';
    }

    // ─── 投稿チェーン ────────────────────────────────────────
    function renderChain() {
      const chain = document.getElementById('post-chain');
      chain.innerHTML = '';

      if (!allPosts.length) {
        chain.textContent = '投稿がありません';
        return;
      }

      allPosts.forEach((post, i) => {
        // 投稿タイトル
        const item = document.createElement('div');
        item.className = 'chain-item';
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(i);
        item.appendChild(link);
        chain.appendChild(item);

        // セパレーター（最後の投稿の後には挿入しない）
        if (i < allPosts.length - 1) {
          const nextPost = allPosts[i + 1];
          const diff = Math.abs(new Date(nextPost.date) - new Date(post.date))
                       / (1000 * 60 * 60 * 24);

          if (diff < 7) {
            const arrowItem = document.createElement('div');
            arrowItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            arrowItem.appendChild(arrow);
            chain.appendChild(arrowItem);
          } else {
            const sepWrap = document.createElement('div');
            sepWrap.className = 'chain-item chain-separator-wrap';
            const sep = document.createElement('hr');
            sep.className = 'chain-separator';
            sepWrap.appendChild(sep);
            chain.appendChild(sepWrap);
          }
        }
      });
    }

    // ─── 初期化処理 ──────────────────────────────────────────
    (async () => {
      // countryId 取得
      const params = new URLSearchParams(location.search);
      const countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        // 国データ取得（sessionStorage キャッシュ優先）
        let country;
        const cachedCountry = sessionStorage.getItem(`country_${countryId}`);
        if (cachedCountry) {
          country = JSON.parse(cachedCountry);
        } else {
          const snap = await getDoc(doc(db, 'countries', countryId));
          if (!snap.exists()) {
            showError('指定された国が見つかりません。');
            return;
          }
          country = { id: snap.id, ...snap.data() };
          sessionStorage.setItem(`country_${countryId}`, JSON.stringify(country));
        }

        // 投稿データ取得（sessionStorage キャッシュ優先）
        const cachedPosts = sessionStorage.getItem(`posts_${countryId}`);
        if (cachedPosts) {
          allPosts = JSON.parse(cachedPosts);
        } else {
          const q = query(
            collection(db, 'posts'),
            where('countryId', '==', countryId),
            orderBy('date', 'asc')
          );
          const snap = await getDocs(q);
          allPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          sessionStorage.setItem(`posts_${countryId}`, JSON.stringify(allPosts));
        }

        // タイトル設定
        document.title = `${country.name} — AKIRA travels`;

        // 国別ヘッダー描画
        document.getElementById('country-title').textContent = country.name;
        if (country.description) {
          document.getElementById('country-description').textContent = country.description;
        }

        // ローディング非表示・コンテンツ表示
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = '';

        // 著作権表示
        document.getElementById('copyright-text').textContent =
          `© 1998–${new Date().getFullYear()} A.Mizui. All rights reserved.`;

        // 描画
        renderCoverPhoto(country);
        renderChain();

      } catch (err) {
        console.error(err);
        showError('データの読み込みに失敗しました。');
      }
    })();
  </script>
</head>
<body class="country-page">

  <!-- 国別ページ本体（初期非表示） -->
  <div id="country-wrap" class="country-wrap" style="display:none;">

    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>

    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" alt="">
    </div>

    <div class="post-chain" id="post-chain"></div>

    <!-- フッター前横棒 -->
    <hr class="footer-rule">

    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img
            src="https://akiratravels.github.io/images/i_home.gif"
            alt="AKIRA travels"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                     this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>

  </div><!-- /#country-wrap -->

  <!-- ローディング -->
  <p id="loading-msg" class="loading">読み込み中…</p>

  <!-- エラー -->
  <p id="error-msg" class="error-msg" style="display:none;"></p>

  <!-- 詳細画面（初期非表示） -->
  <div id="detail-view" class="detail-view" style="display:none;">

    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta"  id="detail-meta"></div>
    </div>

    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
      <!-- hr.footer-rule は renderDetailFooter() で JS 挿入 -->
    </div>

    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>

  </div><!-- /#detail-view -->

</body>
</html>
