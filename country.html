<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
  <style>body { background-attachment: local; }</style>
</head>
<body class="country-page">

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" alt="代表写真">
    </div>
    <div class="post-chain" id="post-chain"></div>
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                        this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="country-copyright-text"></p>
    </footer>
  </div>

  <!-- 詳細画面 -->
  <div id="detail-view" class="detail-view" style="display:none;">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let countryId = '';
    let countryData = null;
    let allPosts = [];
    let currentIdx = 0;
    let ioInstance = null;

    async function init() {
      const params = new URLSearchParams(location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      const currentYear = new Date().getFullYear();
      const copyrightText = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
      document.getElementById('country-copyright-text').textContent = copyrightText;
      document.getElementById('detail-copyright').textContent = copyrightText;

      // Load Country
      const countryKey = `country_${countryId}`;
      const cachedCountry = sessionStorage.getItem(countryKey);
      if (cachedCountry) {
        countryData = JSON.parse(cachedCountry);
      } else {
        try {
          const d = await getDoc(doc(db, 'countries', countryId));
          if (!d.exists()) {
            showError('指定された国が見つかりません。');
            return;
          }
          countryData = d.data();
          sessionStorage.setItem(countryKey, JSON.stringify(countryData));
        } catch (err) {
          showError('データの取得に失敗しました。');
          return;
        }
      }

      document.title = `${countryData.name} — AKIRA travels`;
      document.getElementById('country-title').textContent = countryData.name;
      document.getElementById('country-description').textContent = countryData.description || '';

      // Load Posts
      const postsKey = `posts_${countryId}`;
      const cachedPosts = sessionStorage.getItem(postsKey);
      if (cachedPosts) {
        allPosts = JSON.parse(cachedPosts);
      } else {
        try {
          const q = query(collection(db, 'posts'), where('countryId', '==', countryId), orderBy('date', 'asc'));
          const snapshot = await getDocs(q);
          snapshot.forEach(p => {
            allPosts.push({ id: p.id, ...p.data() });
          });
          sessionStorage.setItem(postsKey, JSON.stringify(allPosts));
        } catch (err) {
          showError('投稿データの取得に失敗しました。');
          return;
        }
      }

      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('country-wrap').style.display = 'block';

      renderCoverPhoto();
      renderChain();
    }

    function renderCoverPhoto() {
      const wrap = document.getElementById('cover-photo-wrap');
      if (countryData.imgUrl) {
        const img = document.getElementById('cover-photo');
        img.src = countryData.imgUrl;
        wrap.style.display = 'block';
        wrap.onclick = () => { if (allPosts.length > 0) openDetail(0); };
      } else {
        wrap.style.display = 'none';
      }
    }

    function renderChain() {
      const container = document.getElementById('post-chain');
      container.innerHTML = '';
      if (allPosts.length === 0) {
        container.textContent = '投稿がありません';
        return;
      }

      allPosts.forEach((post, i) => {
        const item = document.createElement('div');
        item.className = 'chain-item';
        const span = document.createElement('span');
        span.className = 'chain-link';
        span.textContent = post.title;
        span.onclick = () => openDetail(i);
        item.appendChild(span);
        container.appendChild(item);

        if (i < allPosts.length - 1) {
          const dateA = post.date;
          const dateB = allPosts[i + 1].date;
          const diffDays = Math.abs(new Date(dateB) - new Date(dateA)) / (1000 * 60 * 60 * 24);

          if (diffDays < 7) {
            const arrItem = document.createElement('div');
            arrItem.className = 'chain-item';
            const arr = document.createElement('span');
            arr.className = 'chain-arrow';
            arr.textContent = '▼';
            arrItem.appendChild(arr);
            container.appendChild(arrItem);
          } else {
            const sepItem = document.createElement('div');
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
            container.appendChild(sepItem);
          }
        }
      });
    }

    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    window.closeDetail = function() {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = 'block';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
    };

    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.detail === true) {
        document.getElementById('country-wrap').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        currentIdx = event.state.idx;
        renderDetail(event.state.idx);
      } else {
        if (document.getElementById('detail-view').style.display === 'block') {
          closeDetail();
        }
      }
    });

    function generatePosterUrl(videoUrl) {
      if (!videoUrl.includes('upload/')) return '';
      const parts = videoUrl.split('upload/');
      const prefix = parts[0] + 'upload/so_0/l_play_muwwou/';
      let suffix = parts[1];
      suffix = suffix.replace(/\.[^.]+$/, '.webp');
      return prefix + suffix;
    }

    function renderDetail(idx) {
      const post = allPosts[idx];
      document.getElementById('detail-title').textContent = post.title;
      
      const metaParts = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaParts.join(' · ');

      const captionEl = document.getElementById('detail-caption');
      captionEl.textContent = post.caption || '';
      if (post.caption) {
        captionEl.style.marginBottom = '20px';
      }

      const mediaList = document.getElementById('detail-media-list');
      mediaList.innerHTML = '';

      if (post.media && post.media.length > 0) {
        post.media.forEach(m => {
          const item = document.createElement('div');
          item.className = 'media-item';

          if (m.type === 'video') {
            const poster = generatePosterUrl(m.url);
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = 'metadata';
            video.setAttribute('poster', poster);

            const overlay = document.createElement('div');
            overlay.className = 'video-overlay';
            overlay.style.backgroundImage = `url(${poster})`;

            video.addEventListener('click', () => {
              if (!video.paused) {
                stopAllVideos();
              } else {
                stopAllVideos();
                overlay.style.display = 'none';
                video.play();
              }
            });

            video.addEventListener('play', () => { overlay.style.display = 'none'; });
            video.addEventListener('pause', () => { overlay.style.display = ''; });
            video.addEventListener('ended', () => {
              video.currentTime = 0;
              overlay.style.display = '';
            });

            item.appendChild(video);
            item.appendChild(overlay);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || '';
            img.loading = 'lazy';
            item.appendChild(img);
          }

          if (m.caption) {
            const cap = document.createElement('div');
            cap.className = 'media-caption';
            cap.textContent = m.caption;
            item.appendChild(cap);
          } else {
            const spacer = document.createElement('div');
            spacer.style.height = '2em';
            item.appendChild(spacer);
          }

          mediaList.appendChild(item);
        });
      }

      setupVideoExitPause();
      renderDetailFooter(idx);
    }

    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
      }
      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) {
            const vid = entry.target;
            if (!vid.paused) {
              vid.pause();
              vid.currentTime = 0;
              const overlay = vid.nextElementSibling;
              if (overlay) overlay.style.display = '';
            }
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    function renderDetailFooter(idx) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      if (idx < allPosts.length - 1) {
        const nextImg = document.createElement('img');
        nextImg.src = 'https://akiratravels.github.io/images/i_next.gif';
        nextImg.alt = '次へ';
        nextImg.onclick = () => navigateDetail(idx + 1);
        nextImg.onerror = function() {
          this.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateDetail(idx + 1);
          footer.insertBefore(btn, this);
        };
        footer.appendChild(nextImg);
      }

      const homeImg = document.createElement('img');
      homeImg.src = 'https://akiratravels.github.io/images/i_home.gif';
      homeImg.alt = 'HOME';
      homeImg.onclick = () => { location.href = 'index.html'; };
      homeImg.onerror = function() {
        this.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 HOME';
        btn.onclick = () => { location.href = 'index.html'; };
        footer.appendChild(btn);
      };
      footer.appendChild(homeImg);

      const backImg = document.createElement('img');
      backImg.src = 'https://akiratravels.github.io/images/i_last.gif';
      backImg.alt = '戻る';
      backImg.onclick = () => closeDetail();
      backImg.onerror = function() {
        this.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        footer.appendChild(btn);
      };
      footer.appendChild(backImg);
    }

    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    function stopAllVideos() {
      document.querySelectorAll('#detail-media-list video').forEach(vid => {
        vid.pause();
        vid.currentTime = 0;
        const overlay = vid.nextElementSibling;
        if (overlay) overlay.style.display = '';
      });
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    init();
  </script>
</body>
</html>
