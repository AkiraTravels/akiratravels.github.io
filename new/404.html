<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AKIRA travels</title>
  <script>
    const path = location.pathname;
    const repo = '/';
    const redirect = repo + '?' + encodeURIComponent(path.slice(repo.length))
      + '&' + (location.search ? location.search.slice(1) + '&' : '') + location.hash.slice(1);
    history.replaceState(null, null, redirect);
  </script>
</head>
<body>
  <p>リダイレクト中…</p>
</body>
</html>
