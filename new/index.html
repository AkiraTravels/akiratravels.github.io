<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

<div class="top-wrap">
  <div class="top-logo">
    <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
  </div>
  <div id="country-list-wrap"><p class="loading">読み込み中…</p></div>
  <footer class="top-footer">
    <div class="footer-icons">
      <a href="#" title="PROFILE">
        <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>PROFILE</span>';">
      </a>
      <a href="#" title="MAIL">
        <img src="https://akiratravels.github.io/images/i_mail.gif" alt="MAIL"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>MAIL</span>';">
      </a>
      <a href="#" title="Facebook">
        <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>Facebook</span>';">
      </a>
      <a href="#" title="FB Messenger">
        <img src="https://akiratravels.github.io/images/i_fb.png" alt="FB Messenger"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>Messenger</span>';">
      </a>
    </div>
    <p class="copyright" id="copyright-text"></p>
  </footer>
</div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 著作権年表示
const yr = new Date().getFullYear();
document.getElementById('copyright-text').textContent = `© 1998–${yr} AKIRA travels. All rights reserved.`;

// 管理者リンクの表示切り替え
onAuthStateChanged(auth, user => {
  const linkText = document.getElementById('admin-link-text');
  if (user) {
    linkText.textContent = '管理画面';
  } else {
    linkText.textContent = '管理者';
  }
});

// データ読み込み
async function init() {
  const wrap = document.getElementById('country-list-wrap');
  try {
    const [countriesSnap, postsSnap] = await Promise.all([
      getDocs(query(collection(db, 'countries'), orderBy('order', 'asc'))),
      getDocs(collection(db, 'posts'))
    ]);

    // 投稿数集計
    const postCount = {};
    postsSnap.forEach(d => {
      const cid = d.data().countryId;
      if (cid) postCount[cid] = (postCount[cid] || 0) + 1;
    });

    const countries = [];
    countriesSnap.forEach(d => countries.push({ id: d.id, ...d.data() }));

    if (countries.length === 0) {
      wrap.innerHTML = '<p class="loading">国データがありません。</p>';
      return;
    }

    // 2カラムテーブル
    let html = '<table><tbody>';
    for (let i = 0; i < countries.length; i += 2) {
      html += '<tr>';
      html += renderCountryCell(countries[i], postCount);
      if (i + 1 < countries.length) {
        html += renderCountryCell(countries[i + 1], postCount);
      } else {
        html += '<td></td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    wrap.innerHTML = html;

  } catch (err) {
    console.error(err);
    wrap.innerHTML = '<p class="loading">読み込みに失敗しました。</p>';
  }
}

function renderCountryCell(c, postCount) {
  const hasPosts = (postCount[c.id] || 0) > 0;
  const nameClass = hasPosts ? 'country-name has-posts' : 'country-name no-posts';
  const subtitleHtml = c.subtitle
    ? `<span class="country-subtitle">${escHtml(c.subtitle)}</span>` : '';

  const inner = `<span class="${nameClass}">${escHtml(c.name)}</span>${subtitleHtml}`;

  if (hasPosts) {
    return `<td><a href="country.html?id=${encodeURIComponent(c.id)}">${inner}</a></td>`;
  } else {
    return `<td>${inner}</td>`;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
