<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅の記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-logo" onclick="goHome()">旅<span>の</span>記録</div>
  <div class="nav-actions">
    <div id="auth-area"></div>
  </div>
</nav>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-title">世界の旅</div>
    <div class="hero-divider"></div>
    <div class="hero-sub">A journey through the world</div>
  </div>
  <div class="countries-section">
    <div class="section-label">訪問した国・地域</div>
    <div class="country-grid" id="country-grid">
      <div class="loading-state">読み込み中...</div>
    </div>
  </div>
</div>

<!-- COUNTRY PAGE -->
<div id="page-country" class="page">
  <div class="country-header">
    <button class="back-btn" onclick="goHome()">← 国一覧へ戻る</button>
    <div class="country-page-title" id="country-page-title"></div>
  </div>
  <div class="posts-list" id="posts-list"></div>
</div>

<!-- POST DETAIL PAGE -->
<div id="page-post" class="page">
  <div class="post-header">
    <button class="back-btn" id="back-to-country">← 投稿一覧へ戻る</button>
    <div class="post-page-title" id="post-page-title"></div>
    <div class="post-page-date" id="post-page-date"></div>
  </div>
  <div class="media-feed" id="media-feed"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
