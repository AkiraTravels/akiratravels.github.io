<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

  <div class="top-wrap">
    <div class="top-logo">
      <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
    </div>

    <div id="country-list-wrap"><p class="loading">読み込み中…</p></div>

    <footer class="top-footer">
      <div class="footer-icons">
        <a href="https://akiratravels.github.io/profile.html">
          <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
          <span class="footer-icon-btn" style="display:none;">PROFILE</span>
        </a>
        <a href="https://www.facebook.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
          <span class="footer-icon-btn" style="display:none;">Facebook</span>
        </a>
        <a href="https://www.messenger.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
          <span class="footer-icon-btn" style="display:none;">Messenger</span>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import {
      collection, getDocs, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 著作権表示
    const yr = new Date().getFullYear();
    document.getElementById('copyright-text').textContent =
      `© 1998–${yr} AKIRA travels. All rights reserved.`;

    // 管理者リンク認証監視
    onAuthStateChanged(auth, user => {
      const linkText = document.getElementById('admin-link-text');
      if (user) {
        linkText.textContent = '管理画面';
      } else {
        linkText.textContent = '管理者';
      }
    });

    // データ取得
    async function loadCountries() {
      const [countriesSnap, postsSnap] = await Promise.all([
        getDocs(query(collection(db, 'countries'), orderBy('order', 'asc'))),
        getDocs(collection(db, 'posts'))
      ]);

      const countries = [];
      countriesSnap.forEach(doc => countries.push({ id: doc.id, ...doc.data() }));

      const posts = [];
      postsSnap.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));

      // 国ごとの投稿数集計
      const postCount = {};
      posts.forEach(p => {
        postCount[p.countryId] = (postCount[p.countryId] || 0) + 1;
      });

      renderCountryList(countries, posts, postCount);
    }

    function renderCountryList(countries, posts, postCount) {
      const wrap = document.getElementById('country-list-wrap');
      if (countries.length === 0) {
        wrap.innerHTML = '<p class="loading">国データがありません</p>';
        return;
      }

      const table = document.createElement('table');
      for (let i = 0; i < countries.length; i += 2) {
        const tr = document.createElement('tr');
        tr.appendChild(makeCountryCell(countries[i], posts, postCount));
        if (i + 1 < countries.length) {
          tr.appendChild(makeCountryCell(countries[i + 1], posts, postCount));
        } else {
          tr.appendChild(document.createElement('td')); // 空セル
        }
        table.appendChild(tr);
      }
      wrap.innerHTML = '';
      wrap.appendChild(table);
    }

    function makeCountryCell(c, posts, postCount) {
      const td = document.createElement('td');
      td.className = 'country-cell';

      const count = postCount[c.id] || 0;
      const countryPosts = posts.filter(p => p.countryId === c.id);

      // リンク先決定ロジック
      let href = null;
      if (countryPosts.length === 0) {
        href = null;
      } else if (countryPosts.length === 1 && countryPosts[0].location?.startsWith('https')) {
        href = countryPosts[0].location;
      } else if (countryPosts.length === 1) {
        href = `country.html?id=${c.id}`;
      } else {
        const oldest = countryPosts.slice().sort((a, b) => a.date.localeCompare(b.date))[0];
        href = `country.html?id=${c.id}&post=${oldest.id}`;
      }

      const nameEl = document.createElement('span');
      nameEl.className = 'country-name-text';
      nameEl.textContent = c.name;

      let inner;
      if (href) {
        inner = document.createElement('a');
        inner.href = href;
        inner.className = 'country-name-link';
        inner.appendChild(nameEl);
      } else {
        inner = document.createElement('span');
        inner.className = 'country-name-nolink';
        inner.appendChild(nameEl);
      }

      td.appendChild(inner);

      if (c.subtitle) {
        const sub = document.createElement('span');
        sub.className = 'country-subtitle';
        sub.textContent = c.subtitle;
        td.appendChild(sub);
      }

      return td;
    }

    loadCountries().catch(err => {
      document.getElementById('country-list-wrap').innerHTML =
        '<p class="loading">データの読み込みに失敗しました</p>';
      console.error(err);
    });
  </script>
</body>
</html>
