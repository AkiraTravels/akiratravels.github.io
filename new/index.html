<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

<div class="top-wrap">
  <div class="top-logo">
    <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
  </div>

  <div id="country-list-wrap"><p class="loading">読み込み中…</p></div>

  <footer class="top-footer">
    <div class="footer-icons">
      <a href="https://akiratravels.github.io/profile/" target="_blank" rel="noopener">
        <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <span style="display:none;">PROFILE</span>
      </a>
      <a href="https://www.facebook.com/" target="_blank" rel="noopener">
        <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <span style="display:none;">Facebook</span>
      </a>
      <a href="https://m.me/" target="_blank" rel="noopener">
        <img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <span style="display:none;">Messenger</span>
      </a>
    </div>
    <p class="copyright" id="copyright-text"></p>
  </footer>
</div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 著作権
const yr = new Date().getFullYear();
document.getElementById('copyright-text').textContent =
  `© 1998–${yr} AKIRA travels. All rights reserved.`;

// 管理者リンク
onAuthStateChanged(auth, user => {
  document.getElementById('admin-link-text').textContent =
    user ? '管理画面' : '管理者';
});

// データ取得
async function init() {
  try {
    const [countriesSnap, postsSnap] = await Promise.all([
      getDocs(query(collection(db, 'countries'), orderBy('order', 'asc'))),
      getDocs(collection(db, 'posts'))
    ]);

    // 国ごとの投稿数集計
    const postCount = {};
    postsSnap.forEach(d => {
      const cid = d.data().countryId;
      if (cid) postCount[cid] = (postCount[cid] || 0) + 1;
    });

    const countries = [];
    countriesSnap.forEach(d => countries.push({ id: d.id, ...d.data() }));

    renderCountries(countries, postCount);
  } catch (e) {
    document.getElementById('country-list-wrap').innerHTML =
      '<p class="loading" style="color:#cc2200;">データの読み込みに失敗しました。</p>';
    console.error(e);
  }
}

function renderCountries(countries, postCount) {
  const wrap = document.getElementById('country-list-wrap');
  if (countries.length === 0) {
    wrap.innerHTML = '<p class="loading">国がまだ登録されていません。</p>';
    return;
  }

  let html = '<table><tbody>';
  for (let i = 0; i < countries.length; i += 2) {
    html += '<tr>';
    html += buildCell(countries[i], postCount);
    if (i + 1 < countries.length) {
      html += buildCell(countries[i + 1], postCount);
    } else {
      html += '<td></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function buildCell(c, postCount) {
  const count = postCount[c.id] || 0;
  const subtitleHtml = c.subtitle
    ? `<span class="country-subtitle">${escHtml(c.subtitle)}</span>`
    : '';

  if (count > 0) {
    return `<td>
      <a href="country.html?id=${encodeURIComponent(c.id)}">
        <span class="country-name has-posts">${escHtml(c.name)}</span>
        ${subtitleHtml}
      </a>
    </td>`;
  } else {
    return `<td>
      <span class="country-name no-posts">${escHtml(c.name)}</span>
      ${subtitleHtml}
    </td>`;
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
