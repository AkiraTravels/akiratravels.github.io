<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

  <div class="top-wrap">
    <div class="top-logo">
      <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
    </div>
    <div id="country-list-wrap"><p class="loading">読み込み中…</p></div>
    <footer class="top-footer">
      <div class="footer-icons">
        <a href="https://akiratravels.github.io/profile.html" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="modal-footer-btn" style="display:none;">PROFILE</button>
        </a>
        <a href="https://www.facebook.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="modal-footer-btn" style="display:none;">Facebook</button>
        </a>
        <a href="https://m.me/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/i_fb.png" alt="FB Messenger"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="modal-footer-btn" style="display:none;">Messenger</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import {
      collection, getDocs, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 著作権
    const yr = new Date().getFullYear();
    document.getElementById('copyright-text').textContent =
      `© 1998–${yr} AKIRA travels. All rights reserved.`;

    // 管理者リンク
    onAuthStateChanged(auth, user => {
      const linkText = document.getElementById('admin-link-text');
      linkText.textContent = user ? '管理画面' : '管理者';
    });

    // データ取得
    async function loadPage() {
      try {
        const [countriesSnap, postsSnap] = await Promise.all([
          getDocs(query(collection(db, 'countries'), orderBy('order', 'asc'))),
          getDocs(collection(db, 'posts'))
        ]);

        const countries = [];
        countriesSnap.forEach(d => countries.push({ id: d.id, ...d.data() }));

        const postsByCountry = {};
        postsSnap.forEach(d => {
          const p = { id: d.id, ...d.data() };
          if (!postsByCountry[p.countryId]) postsByCountry[p.countryId] = [];
          postsByCountry[p.countryId].push(p);
        });

        renderList(countries, postsByCountry);
      } catch (e) {
        document.getElementById('country-list-wrap').innerHTML =
          '<p class="loading">読み込みに失敗しました。</p>';
        console.error(e);
      }
    }

    function renderList(countries, postsByCountry) {
      const wrap = document.getElementById('country-list-wrap');
      if (countries.length === 0) {
        wrap.innerHTML = '<p class="loading">国情報がありません。</p>';
        return;
      }

      const table = document.createElement('table');
      let row;
      countries.forEach((c, i) => {
        if (i % 2 === 0) {
          row = document.createElement('tr');
          table.appendChild(row);
        }
        const td = document.createElement('td');
        td.appendChild(buildCountryCell(c, postsByCountry));
        row.appendChild(td);
      });
      // 奇数件のとき最終行の右セルは空
      if (countries.length % 2 !== 0) {
        const empty = document.createElement('td');
        row.appendChild(empty);
      }

      wrap.innerHTML = '';
      wrap.appendChild(table);
    }

    function buildCountryCell(c, postsByCountry) {
      const countryPosts = postsByCountry[c.id] || [];
      const hasPosts = countryPosts.length > 0;

      // リンク先決定
      let href;
	if (countryPosts.length === 0) {
	  href = null;
	} else if (countryPosts.length === 1 && countryPosts[0].location?.startsWith('https')) {
	  href = countryPosts[0].location;
	} else {
  href = `country.html?id=${c.id}`;
      }

      const wrap = document.createElement('div');
      wrap.style.padding = '6px 4px';

      const nameEl = document.createElement('span');
      nameEl.className = 'country-name-text ' + (hasPosts ? 'has-posts' : 'no-posts');

      if (href) {
        const a = document.createElement('a');
        a.href = href;
        a.textContent = c.name;
        nameEl.appendChild(a);
      } else {
        nameEl.textContent = c.name;
      }
      wrap.appendChild(nameEl);

      if (c.subtitle) {
        const sub = document.createElement('span');
        sub.className = 'country-subtitle';
        sub.textContent = c.subtitle;
        wrap.appendChild(sub);
      }

      return wrap;
    }

    loadPage();
  </script>
</body>
</html>
