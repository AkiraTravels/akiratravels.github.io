<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — AKIRA travels</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <header class="admin-header">
    <div class="admin-header-title">
      AKIRA travels <span>ADMIN</span>
    </div>
    <div id="header-user" style="display:none;">
      <span id="header-email"></span>
      <button id="btn-logout" class="btn-secondary">ログアウト</button>
    </div>
  </header>

  <!-- 未ログイン時 -->
  <div id="login-screen" style="display:none;">
    <h2>管理者ログイン</h2>
    <p id="login-error"></p>
    <input type="email" id="login-email" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
    <button id="btn-login" class="btn-primary">ログイン</button>
  </div>

  <!-- ログイン済み時 -->
  <div id="admin-main" style="display:none;">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="new-post">✏️ 新規投稿</button>
      <button class="tab-btn" data-tab="post-list">📋 投稿一覧</button>
      <button class="tab-btn" data-tab="country-mgmt">🌍 国管理</button>
    </div>

    <!-- 新規投稿タブ -->
    <div id="tab-new-post" class="tab-panel active">
      <div class="form-card">
        <h2 id="post-form-title">新規投稿</h2>
        <div class="form-row">
          <label>国</label>
          <select id="f-country"><option value="">国を選択…</option></select>
        </div>
        <div class="form-row">
          <label>日付</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-row">
          <label>タイトル</label>
          <input type="text" id="f-title" placeholder="投稿タイトル">
        </div>
        <div class="form-row">
          <label>場所・地名（任意）</label>
          <input type="text" id="f-location" placeholder="場所名 または https://...">
        </div>
        <div class="form-row">
          <label>説明文</label>
          <textarea id="f-caption" rows="4" placeholder="投稿の説明文…"></textarea>
        </div>
        <div class="form-row">
          <label>メディア</label>
          <div id="media-list"></div>
          <button id="btn-add-media">＋ メディアを追加</button>
        </div>
        <div class="form-actions">
          <button id="btn-submit-post" class="btn-primary">投稿する</button>
          <button id="btn-cancel-edit" class="btn-secondary" style="display:none;">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- 投稿一覧タブ -->
    <div id="tab-post-list" class="tab-panel">
      <select id="list-country-filter"><option value="">すべての国</option></select>
      <div id="post-list-items"></div>
    </div>

    <!-- 国管理タブ -->
    <div id="tab-country-mgmt" class="tab-panel">
      <div class="country-form-card">
        <h2 id="country-form-title">国を追加</h2>
        <input type="hidden" id="edit-country-id">
        <div class="form-row">
          <label>国名</label>
          <input type="text" id="c-name" placeholder="例: 日本">
        </div>
        <div class="form-row">
          <label>国旗絵文字</label>
          <input type="text" id="c-flag" maxlength="8" placeholder="🇯🇵">
        </div>
        <div class="form-row">
          <label>表示順（小さいほど先頭）</label>
          <input type="number" id="c-order" value="100" min="0">
        </div>
        <div class="form-row">
          <label>サブタイトル（任意）</label>
          <input type="text" id="c-subtitle" placeholder="任意のサブタイトル">
        </div>
        <div class="form-row">
          <label>紹介文</label>
          <textarea id="c-description" rows="4" placeholder="国別ページの紹介文…"></textarea>
        </div>
        <div class="form-actions">
          <button id="btn-save-country" class="btn-primary">保存</button>
          <button id="btn-cancel-country" class="btn-secondary" style="display:none;">キャンセル</button>
        </div>
      </div>
      <div id="country-list-items"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./index.js"></script>
</body>
</html>
