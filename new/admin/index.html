<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — AKIRA travels</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- ヘッダー -->
<header class="admin-header">
  <div>
    <div class="admin-header-title">AKIRA travels</div>
    <div class="admin-header-sub">ADMIN</div>
  </div>
  <div class="admin-header-right" id="header-user" style="display:none;">
    <span id="user-email"></span>
    <button class="btn-logout" id="btn-logout">ログアウト</button>
  </div>
</header>

<!-- ログイン画面 -->
<div id="login-screen" class="login-screen">
  <div class="login-title">AKIRA travels</div>
  <div class="login-subtitle">ADMIN LOGIN</div>
  <div class="login-card">
    <input type="email" id="login-email" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
    <button class="btn-login" id="btn-login">ログイン</button>
    <p class="login-error" id="login-error" style="display:none;"></p>
  </div>
</div>

<!-- 管理メイン -->
<div id="admin-main" class="admin-main" style="display:none;">
  <div class="tabs">
    <button class="tab-btn active" data-tab="new-post">✏️ 新規投稿</button>
    <button class="tab-btn" data-tab="post-list">📋 投稿一覧</button>
    <button class="tab-btn" data-tab="country-mgmt">🌍 国管理</button>
  </div>

  <!-- ━━━ 新規投稿タブ ━━━ -->
  <div class="tab-panel active" id="tab-new-post">
    <div class="card">
      <div class="section-title" id="post-form-title">新規投稿</div>
      <input type="hidden" id="edit-post-id">

      <div class="form-row">
        <label>国・地域 *</label>
        <select id="f-country"></select>
      </div>
      <div class="form-row">
        <label>日付 *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-row">
        <label>タイトル *</label>
        <input type="text" id="f-title" placeholder="例: サハラ砂漠に沈む夕日">
      </div>
      <div class="form-row">
        <label>場所・地名</label>
        <input type="text" id="f-location" placeholder="例: マラケシュ">
      </div>
      <div class="form-row">
        <label>投稿の説明</label>
        <textarea id="f-caption" rows="4" placeholder="この投稿の説明文（モーダル上部に表示）"></textarea>
      </div>

      <!-- メディアリスト -->
      <div class="media-section-title">メディア</div>
      <div id="media-list" class="media-list"></div>

      <!-- 最初のインサートボタン -->
      <div class="insert-btn-wrap" id="insert-top">
        <button class="btn-insert" data-pos="0">＋ ここに追加</button>
      </div>

      <!-- フォーム下部ボタン -->
      <div class="form-actions">
        <button class="btn-add-media" id="btn-add-media-bottom">☁️ メディアを追加</button>
        <button class="btn-submit" id="btn-submit-post">投稿する</button>
        <button class="btn-cancel" id="btn-cancel-edit" style="display:none;">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ━━━ 投稿一覧タブ ━━━ -->
  <div class="tab-panel" id="tab-post-list">
    <div class="card">
      <div class="section-title">投稿一覧</div>
      <div id="post-list-container">
        <p class="loading">読み込み中…</p>
      </div>
    </div>
  </div>

  <!-- ━━━ 国管理タブ ━━━ -->
  <div class="tab-panel" id="tab-country-mgmt">
    <div class="card">
      <div class="section-title">国を追加</div>
      <div class="country-form-card">
        <input type="hidden" id="edit-country-id">
        <div class="form-row">
          <label>国名 *</label>
          <input type="text" id="c-name" placeholder="例: モロッコ">
        </div>
        <div class="form-row">
          <label>国旗絵文字 *</label>
          <input type="text" id="c-flag" placeholder="例: 🇲🇦" maxlength="8">
        </div>
        <div class="form-row">
          <label>表示順（数値、小さいほど先頭）</label>
          <input type="number" id="c-order" placeholder="例: 10" value="100">
        </div>
        <div class="form-row">
          <label>サブタイトル（トップページの国名下）</label>
          <input type="text" id="c-subtitle" placeholder="例: 砂漠と迷宮の国">
        </div>
        <div class="form-row">
          <label>紹介文</label>
          <textarea id="c-description" rows="4" placeholder="国別ページの投稿リスト上部に表示される説明文"></textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-submit" id="btn-save-country">保存</button>
          <button class="btn-cancel" id="btn-cancel-country" style="display:none;">キャンセル</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">国一覧</div>
      <div id="country-list-mgmt">
        <p class="loading">読み込み中…</p>
      </div>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div id="toast" class="toast"></div>

<script type="module" src="./index.js"></script>
</body>
</html>
