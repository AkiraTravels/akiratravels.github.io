<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — AKIRA travels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@400;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="admin-header">
    <div class="admin-header-title">
      <span class="admin-header-brand">AKIRA travels</span>
      <span class="admin-header-label">Admin</span>
    </div>
    <div id="header-user" style="display:none;">
      <span id="header-user-email"></span>
      <button id="btn-logout">ログアウト</button>
    </div>
  </header>

  <!-- ログイン画面 -->
  <div id="login-screen" style="display:none;">
    <div class="login-card">
      <h2 class="login-title">管理者ログイン</h2>
      <div class="login-field">
        <label class="login-label" for="login-email">メールアドレス</label>
        <input type="email" id="login-email" class="login-input" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label class="login-label" for="login-password">パスワード</label>
        <input type="password" id="login-password" class="login-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="btn-login">ログイン</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- メイン（ログイン済み） -->
  <div id="admin-main" style="display:none;">
    <!-- タブバー -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="new-post">✏️ 新規投稿</button>
      <button class="tab-btn" data-tab="post-list">📋 投稿一覧</button>
      <button class="tab-btn" data-tab="country-mgmt">🌍 国管理</button>
    </div>

    <!-- 新規投稿タブ -->
    <div id="tab-new-post" class="tab-panel active">
      <div class="card">
        <h2 class="card-title" id="post-form-title">新規投稿</h2>

        <div class="form-field">
          <label class="form-label" for="f-country">国</label>
          <select id="f-country" class="form-select">
            <option value="">— 国を選択 —</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label" for="f-date">日付</label>
          <input type="date" id="f-date" class="form-input">
        </div>

        <div class="form-field">
          <label class="form-label" for="f-title">タイトル</label>
          <input type="text" id="f-title" class="form-input" placeholder="投稿タイトル">
        </div>

        <div class="form-field">
          <label class="form-label" for="f-location">場所（任意）</label>
          <input type="text" id="f-location" class="form-input" placeholder="地名または外部URL">
        </div>

        <div class="form-field">
          <label class="form-label" for="f-caption">説明文（任意）</label>
          <textarea id="f-caption" class="form-textarea" rows="4" placeholder="投稿全体の説明文"></textarea>
        </div>

        <!-- メディアリスト -->
        <div class="form-label" style="margin-top:20px; margin-bottom:8px;">メディア</div>
        <div class="media-list-wrap" id="media-list"></div>
        <div class="add-media-wrap">
          <button class="btn btn-secondary" id="btn-add-media">＋ メディアを追加</button>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-submit-post">投稿する</button>
          <button class="btn btn-secondary" id="btn-cancel-edit" style="display:none;">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- 投稿一覧タブ -->
    <div id="tab-post-list" class="tab-panel">
      <div class="card">
        <h2 class="card-title">投稿一覧</h2>
        <div class="list-filter-wrap">
          <select id="list-country-filter" class="form-select">
            <option value="">すべての国</option>
          </select>
        </div>
        <div id="post-list-container">
          <p class="loading">読み込み中…</p>
        </div>
      </div>
    </div>

    <!-- 国管理タブ -->
    <div id="tab-country-mgmt" class="tab-panel">
      <div class="card country-form-card">
        <h2 class="card-title" id="country-form-title">国を追加</h2>

        <input type="hidden" id="edit-country-id">

        <div class="form-field">
          <label class="form-label" for="c-name">国名</label>
          <input type="text" id="c-name" class="form-input" placeholder="日本">
        </div>

        <div class="form-field">
          <label class="form-label" for="c-flag">国旗絵文字</label>
          <input type="text" id="c-flag" class="form-input" maxlength="8" placeholder="🇯🇵">
        </div>

        <div class="form-field">
          <label class="form-label" for="c-order">表示順</label>
          <input type="number" id="c-order" class="form-input" value="100" min="0">
        </div>

        <div class="form-field">
          <label class="form-label" for="c-subtitle">サブタイトル（任意）</label>
          <input type="text" id="c-subtitle" class="form-input" placeholder="国名下のサブタイトル">
        </div>

        <div class="form-field">
          <label class="form-label" for="c-description">紹介文（任意）</label>
          <textarea id="c-description" class="form-textarea" rows="4" placeholder="国別ページの紹介文"></textarea>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save-country">保存</button>
          <button class="btn btn-secondary" id="btn-cancel-country" style="display:none;">キャンセル</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">国一覧</h2>
        <div id="country-list-container">
          <p class="loading">読み込み中…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- トースト -->
  <div id="toast" class="toast"></div>

  <script type="module" src="./index.js"></script>
</body>
</html>
