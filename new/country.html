<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 管理者リンク -->
<div id="admin-link">
  <a href="admin/" id="admin-link-text">管理者</a>
</div>

<!-- 国別ページ本体 -->
<div id="country-wrap" class="country-wrap" style="display:none;">
  <div class="country-header">
    <h1 class="country-title" id="country-title"></h1>
    <p class="country-description" id="country-description"></p>
  </div>
  <!-- 代表写真 -->
  <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
    <img id="cover-photo" src="" alt="">
  </div>
  <!-- 投稿チェーン -->
  <div class="post-chain" id="post-chain"></div>
</div>

<div id="loading-msg" class="loading">読み込み中…</div>
<div id="error-msg" class="error-msg" style="display:none;"></div>

<!-- 詳細モーダル -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sticky-bar">
    <div class="modal-sticky-title" id="modal-title"></div>
    <div class="modal-sticky-meta" id="modal-meta"></div>
  </div>
  <div class="modal-body">
    <div class="modal-caption" id="modal-caption"></div>
    <div id="modal-media-list"></div>
  </div>
  <div class="modal-footer" id="modal-footer"></div>
  <div class="modal-copyright" id="modal-copyright"></div>
</div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import {
  collection, getDocs, query, orderBy, doc, getDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// 著作権年
const yr = new Date().getFullYear();
document.getElementById('modal-copyright').textContent =
  `© 1998–${yr} AKIRA travels. All rights reserved.`;

// 管理者リンク
onAuthStateChanged(auth, user => {
  document.getElementById('admin-link-text').textContent =
    user ? '管理画面' : '管理者';
});

const BASE_IMG = 'https://akiratravels.github.io/images/';

function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// URL から countryId 取得
const params = new URLSearchParams(location.search);
const countryId = params.get('id');

let allPosts = [];   // この国の投稿（日付昇順）
let countryName = '';
let countryFolderName = '';

async function init() {
  if (!countryId) {
    showError('IDが指定されていません。');
    return;
  }

  try {
    // 国情報取得
    const countryDoc = await getDoc(doc(db, 'countries', countryId));
    if (!countryDoc.exists()) {
      showError('国が見つかりません。');
      return;
    }
    const country = countryDoc.data();
    countryName = country.name || '';

    document.title = `${countryName} — AKIRA travels`;
    document.getElementById('country-title').textContent = countryName;
    document.getElementById('country-description').textContent = country.description || '';

    // 投稿取得（全件 date 昇順 → JS でフィルタ）
    const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')));
    allPosts = [];
    postsSnap.forEach(d => {
      const data = d.data();
      if (data.countryId === countryId) allPosts.push({ id: d.id, ...data });
    });

    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('country-wrap').style.display = '';

    renderCoverPhoto();
    renderChain();
  } catch (e) {
    console.error(e);
    showError('読み込みに失敗しました。');
  }
}

function showError(msg) {
  document.getElementById('loading-msg').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = '';
}

function renderCoverPhoto() {
  if (allPosts.length === 0) return;

  // isCover: true のメディアを探す
  let coverUrl = null;
  for (const post of allPosts) {
    if (!post.media) continue;
    const m = post.media.find(x => x.isCover && x.type === 'image');
    if (m) { coverUrl = m.url; break; }
  }
  // なければ最初の image メディア
  if (!coverUrl) {
    outer: for (const post of allPosts) {
      if (!post.media) continue;
      for (const m of post.media) {
        if (m.type === 'image') { coverUrl = m.url; break outer; }
      }
    }
  }

  if (coverUrl) {
    const wrap = document.getElementById('cover-photo-wrap');
    const img = document.getElementById('cover-photo');
    img.src = coverUrl;
    img.alt = countryName;
    wrap.style.display = '';
    // タップで最も古い投稿を開く
    wrap.addEventListener('click', () => openModal(0));
  }
}

function renderChain() {
  const chain = document.getElementById('post-chain');
  if (allPosts.length === 0) {
    chain.innerHTML = '<p style="text-align:center;color:#9a7a50;font-size:14px;">投稿はまだありません</p>';
    return;
  }

  let html = '';
  allPosts.forEach((post, idx) => {
    const meta = [post.date, post.location].filter(Boolean).join(' · ');
    html += `<div class="chain-item">
      <span class="chain-link" data-idx="${idx}">${escHtml(post.title)}</span>
      <span class="chain-meta">${escHtml(meta)}</span>
    </div>`;
    if (idx < allPosts.length - 1) {
      html += `<div class="chain-item"><span class="chain-arrow">▼</span></div>`;
    }
  });
  chain.innerHTML = html;

  chain.querySelectorAll('.chain-link').forEach(el => {
    el.addEventListener('click', () => openModal(Number(el.dataset.idx)));
  });
}

// ─── モーダル ───

let currentIdx = -1;
let intersectionObserver = null;

function openModal(idx) {
  currentIdx = idx;
  renderModal(idx);
  const modal = document.getElementById('modal');
  modal.classList.add('open');
  modal.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // ブラウザ履歴にモーダル状態を追加
  history.pushState({ modal: true, idx }, '', location.href);
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('open');
  document.body.style.overflow = '';
  stopAllVideos();
  if (intersectionObserver) {
    intersectionObserver.disconnect();
    intersectionObserver = null;
  }
}

// ブラウザバックでモーダルを閉じる
window.addEventListener('popstate', e => {
  if (document.getElementById('modal').classList.contains('open')) {
    closeModal();
  }
});

function renderModal(idx) {
  const post = allPosts[idx];
  if (!post) return;

  // 上部バー
  document.getElementById('modal-title').textContent = post.title || '';
  const meta = [post.date, post.location].filter(Boolean).join(' · ');
  document.getElementById('modal-meta').textContent = meta;

  // キャプション
  document.getElementById('modal-caption').textContent = post.caption || '';

  // メディア
  const mediaList = document.getElementById('modal-media-list');
  mediaList.innerHTML = '';
  if (post.media && post.media.length > 0) {
    post.media.forEach((m, mi) => {
      const item = document.createElement('div');
      item.className = 'media-item';

      if (m.type === 'video') {
        const vid = document.createElement('video');
        vid.src = m.url;
        vid.playsInline = true;
        vid.controls = false;
        vid.preload = 'metadata';
        vid.dataset.midx = mi;

        // タップで再生/停止
        vid.addEventListener('click', () => {
          if (vid.paused) {
            stopAllVideos();
            vid.play();
          } else {
            vid.pause();
          }
        });
        // 終了後リセット
        vid.addEventListener('ended', () => {
          vid.load();
        });

        item.appendChild(vid);
      } else {
        const img = document.createElement('img');
        img.src = m.url;
        img.alt = m.caption || '';
        img.loading = 'lazy';
        item.appendChild(img);
      }

      if (m.caption) {
        const cap = document.createElement('div');
        cap.className = 'media-caption';
        cap.textContent = m.caption;
        item.appendChild(cap);
      }

      mediaList.appendChild(item);
    });

    // 動画自動再生（IntersectionObserver、threshold: 0.6）
    setupVideoAutoplay();
  }

  // フッターナビ
  renderModalFooter(idx);
}

function renderModalFooter(idx) {
  const footer = document.getElementById('modal-footer');
  const hasNext = idx < allPosts.length - 1;

  footer.innerHTML = '';

  if (hasNext) {
    // 次へボタン
    const nextBtn = document.createElement('img');
    nextBtn.src = `${BASE_IMG}i_next.gif`;
    nextBtn.alt = '次へ';
    nextBtn.onerror = function() {
      this.outerHTML = '<button class="modal-footer-btn" id="next-btn">次へ ▶</button>';
      document.getElementById('next-btn').addEventListener('click', () => navigateModal(idx + 1));
    };
    nextBtn.addEventListener('click', () => navigateModal(idx + 1));
    footer.appendChild(nextBtn);
  }

  // 戻るボタン（国別ページへ）
  const backBtn = document.createElement('img');
  // 国別「戻る」画像を試みる（フォールバックでテキストボタン）
  const countryFolder = countryName.toLowerCase().replace(/\s+/g, '-');
  backBtn.src = `https://akiratravels.github.io/${countryFolder}/images/i_${countryFolder}.gif`;
  backBtn.alt = '戻る';
  backBtn.onerror = function() {
    this.outerHTML = '<button class="modal-footer-btn" id="back-btn">← 戻る</button>';
    document.getElementById('back-btn').addEventListener('click', () => closeModal());
  };
  backBtn.addEventListener('click', () => closeModal());
  footer.appendChild(backBtn);

  // HOMEボタン
  const homeBtn = document.createElement('img');
  homeBtn.src = `${BASE_IMG}i_home.gif`;
  homeBtn.alt = 'AKIRA travels';
  homeBtn.onerror = function() {
    this.outerHTML = '<button class="modal-footer-btn" id="home-btn">🏠 TOP</button>';
    document.getElementById('home-btn').addEventListener('click', () => location.href = 'index.html');
  };
  homeBtn.addEventListener('click', () => location.href = 'index.html');
  footer.appendChild(homeBtn);
}

function navigateModal(idx) {
  stopAllVideos();
  if (intersectionObserver) {
    intersectionObserver.disconnect();
    intersectionObserver = null;
  }
  currentIdx = idx;
  renderModal(idx);
  document.getElementById('modal').scrollTop = 0;
  // 履歴を更新
  history.replaceState({ modal: true, idx }, '', location.href);
}

function stopAllVideos() {
  document.querySelectorAll('#modal-media-list video').forEach(v => {
    v.pause();
    v.load();
  });
}

function setupVideoAutoplay() {
  if (intersectionObserver) intersectionObserver.disconnect();
  const videos = document.querySelectorAll('#modal-media-list video');
  if (videos.length === 0) return;

  intersectionObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const vid = entry.target;
      if (entry.isIntersecting && vid.paused) {
        stopAllVideos();
        vid.play().catch(() => {});
      } else if (!entry.isIntersecting && !vid.paused) {
        vid.pause();
      }
    });
  }, { threshold: 0.6 });

  videos.forEach(v => intersectionObserver.observe(v));
}

init();
</script>
</body>
</html>
