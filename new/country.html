<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=yes">
<title>旅行記 — AKIRA travels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Meiryo, sans-serif;
  background: #fff; color: #333; font-size: 14px; line-height: 1.7;
}

#site-header {
  text-align: center; padding: 10px 8px 8px;
  border-bottom: 2px solid #333;
}
#site-header a { text-decoration: none; color: inherit; }
.site-title-link {
  font-size: 18px; font-weight: bold;
  display: inline-block; padding: 4px 0;
  letter-spacing: 0.03em;
}

#main-content {
  max-width: 660px; margin: 0 auto;
  padding: 16px 14px 40px; text-align: center;
}

/* 国バナー画像 */
.country-banner { margin: 8px auto 14px; }
.country-banner img {
  max-width: 100%; height: auto;
  border: 1px solid #ddd; display: block; margin: 0 auto;
}

/* 国の紹介文 */
.country-intro {
  font-size: 13px; font-weight: bold;
  line-height: 2.0; margin: 0 0 20px;
  text-align: left; display: inline-block;
}

/* 代表サムネイル */
.cover-thumb {
  display: block; margin: 0 auto 10px; cursor: pointer;
  text-align: center;
}
.cover-thumb img {
  max-width: 100%; max-height: 300px;
  object-fit: cover; border: 1px solid #ddd;
  display: block; margin: 0 auto;
}
.cover-thumb-video {
  background: #111; padding: 24px 40px;
  display: inline-block; cursor: pointer;
  margin: 0 auto 10px;
}
.cover-thumb-video .play-icon { font-size: 36px; color: #fff; }
.cover-thumb-video .play-label { font-size: 12px; color: #aaa; margin-top: 4px; }

/* 投稿チェーン */
.post-chain { text-align: center; margin: 8px auto 0; }
.chain-link-item { margin: 2px 0; line-height: 2.2; }
.chain-link-item a {
  font-weight: bold; font-size: 14px;
  color: #0000cc; text-decoration: none;
}
.chain-link-item a:hover  { text-decoration: underline; color: #cc0000; }
.chain-link-item a:visited { color: #551a8b; }
.chain-date { font-size: 11px; color: #888; }
.chain-arrow { color: #333; font-size: 14px; line-height: 1.2; }

/* フッター */
#site-footer {
  text-align: center; padding: 12px 14px 20px;
  border-top: 2px solid #333; margin-top: 8px;
}
#site-footer img { height: 28px; margin: 0 3px 4px; vertical-align: middle; }
.copyright { font-size: 11px; color: #888; margin-top: 10px; letter-spacing: 0.03em; }

/* 管理リンク */
#admin-link {
  position: fixed; top: 6px; right: 8px; z-index: 200; font-size: 10px;
}
#admin-link a {
  color: #888; text-decoration: none; background: rgba(255,255,255,0.88);
  padding: 2px 7px; border: 1px solid #ccc; border-radius: 3px;
}
#admin-link a:hover { color: #333; }

.status-msg { font-size: 12px; color: #888; text-align: center; padding: 20px 0; }

/* ===== MODAL（写真・動画フィード） ===== */
#media-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 500; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#media-modal.open { display: block; }

.modal-topbar {
  position: sticky; top: 0; z-index: 501;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0,0,0,0.7);
}
.modal-topbar-title {
  color: #fff; font-size: 14px; font-weight: bold;
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-right: 8px;
}
.modal-close-btn {
  background: rgba(255,255,255,0.18); color: #fff;
  border: none; font-size: 20px;
  width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.modal-close-btn:hover { background: rgba(255,255,255,0.35); }
.modal-post-date {
  font-size: 11px; color: #aaa; text-align: center;
  padding: 2px 12px 10px;
}

/* メディアアイテム */
.modal-media-item { margin-bottom: 3px; }
.modal-media-wrapper {
  width: 100%; background: #000;
  position: relative; overflow: hidden;
}
.modal-media-wrapper img,
.modal-media-wrapper video {
  width: 100%; display: block;
  max-height: 88vh; object-fit: contain; background: #000;
}

/* 動画オーバーレイ */
.video-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.28); cursor: pointer;
  transition: opacity 0.25s;
}
.video-overlay.hidden { opacity: 0; pointer-events: none; }
.play-btn {
  width: 62px; height: 62px;
  background: rgba(255,255,255,0.92); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.play-btn svg { width: 26px; height: 26px; fill: #222; margin-left: 4px; }

.modal-caption {
  padding: 10px 14px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.modal-caption-text { color: #ddd; font-size: 13px; line-height: 1.8; white-space: pre-line; }
.modal-caption-loc  { font-size: 11px; color: #999; margin-top: 5px; }
</style>
</head>
<body>

<div id="admin-link"></div>

<div id="site-header">
  <a href="index.html"><div class="site-title-link">AKIRA travels ～ だから一人旅はやめられない</div></a>
</div>

<div id="main-content">
  <div id="country-content"><div class="status-msg">読み込み中...</div></div>
</div>

<div id="site-footer">
  <a href="index.html"><img src="https://akiratravels.github.io/images/i_home.gif" alt="HOME"></a>
  <a href="https://akiratravels.github.io/profile/index.html"><img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"></a>
  <a href="mailto:akira.mizui@gmail.com"><img src="https://akiratravels.github.io/images/i_mail.gif" alt="MAIL"></a>
  <a href="https://www.facebook.com/akiratravels" target="_blank"><img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"></a>
  <a href="https://m.me/akiratravels" target="_blank"><img src="https://akiratravels.github.io/images/i_fb.png" alt="FB Messenger"></a>
  <div class="copyright" id="copyright-text"></div>
</div>

<!-- MODAL -->
<div id="media-modal">
  <div class="modal-topbar">
    <div class="modal-topbar-title" id="modal-post-title"></div>
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-post-date" id="modal-post-date"></div>
  <div id="modal-media-feed"></div>
</div>

<script type="module">
import { db, auth } from "./js/firebase-config.js";
import {
  collection, getDocs, getDoc, doc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 著作権年
const startYear = 1998;
const nowYear   = new Date().getFullYear();
document.getElementById('copyright-text').textContent =
  `© ${startYear}–${nowYear} AKIRA travels. All rights reserved.`;

// 管理リンク
onAuthStateChanged(auth, user => {
  document.getElementById('admin-link').innerHTML =
    `<a href="admin/">${user ? '管理画面' : '管理者'}</a>`;
});

// URL パラメータ
const params    = new URLSearchParams(location.search);
const countryId = params.get('id');
if (!countryId) {
  document.getElementById('country-content').innerHTML =
    '<div class="status-msg">URLが正しくありません</div>';
} else {
  loadCountryPage(countryId);
}

async function loadCountryPage(countryId) {
  const area = document.getElementById('country-content');
  try {
    const countryDoc = await getDoc(doc(db, 'countries', countryId));
    if (!countryDoc.exists()) throw new Error('国が見つかりません');
    const country = { id: countryId, ...countryDoc.data() };

    document.title = `${country.name} 旅行記 — AKIRA travels`;

    // where+orderBy複合クエリを避けてJSでフィルタ・ソート
    const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')));
    const posts = [];
    postsSnap.forEach(d => {
      const p = { id: d.id, ...d.data() };
      if (p.countryId === countryId) posts.push(p);
    });

    // 紹介文
    let html = '';
    if (country.description) {
      html += `<p class="country-intro">${escHtml(country.description).replace(/\n/g,'<br>')}</p>`;
    }

    // 代表写真：全投稿の中から isCover=true の画像を探す、なければ最初の画像
    let coverMedia = null;
    let coverPost  = null;
    for (const p of posts) {
      const m = (p.media || []).find(m => m.isCover && m.type === 'image');
      if (m) { coverMedia = m; coverPost = p; break; }
    }
    if (!coverMedia && posts.length > 0) {
      for (const p of posts) {
        const m = (p.media || []).find(m => m.type === 'image');
        if (m) { coverMedia = m; coverPost = p; break; }
      }
    }

    if (coverMedia) {
      html += `
        <div class="cover-thumb" onclick="openModal('${coverPost.id}')">
          <img src="${coverMedia.url}" alt="${escHtml(coverPost.title)}"
               onerror="this.parentElement.style.display='none'">
        </div>`;
    }

    // 投稿チェーン（▼でつなぐ）
    if (posts.length === 0) {
      html += '<div class="status-msg">まだ投稿がありません</div>';
    } else {
      html += '<div class="post-chain">';
      posts.forEach((post, i) => {
        if (i > 0) html += '<div class="chain-arrow">▼</div>';
        html += `
          <div class="chain-link-item">
            <a href="#" onclick="openModal('${post.id}');return false;">${escHtml(post.title)}</a>
          </div>
          <div class="chain-date">${formatDate(post.date)}${post.location ? ' · ' + escHtml(post.location) : ''}</div>`;
      });
      html += '</div>';
    }

    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = `<div class="status-msg">読み込みに失敗しました<br><small>${e.message}</small></div>`;
    console.error(e);
  }
}

// ===== MODAL =====
let videoObserver = null;

window.openModal = async function(postId) {
  const modal  = document.getElementById('media-modal');
  const feed   = document.getElementById('modal-media-feed');
  const titleEl = document.getElementById('modal-post-title');
  const dateEl  = document.getElementById('modal-post-date');

  feed.innerHTML    = '<div class="status-msg" style="color:#aaa;padding:48px 0">読み込み中...</div>';
  titleEl.textContent = '';
  dateEl.textContent  = '';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const d    = await getDoc(doc(db, 'posts', postId));
    if (!d.exists()) throw new Error('投稿が見つかりません');
    const post = { id: postId, ...d.data() };

    titleEl.textContent = post.title;
    dateEl.textContent  = formatDate(post.date) + (post.location ? '　📍 ' + post.location : '');

    feed.innerHTML = '';
    if (!post.media || post.media.length === 0) {
      feed.innerHTML = '<div class="status-msg" style="color:#aaa">メディアがありません</div>';
      return;
    }

    post.media.forEach((m, idx) => {
      const item = document.createElement('div');
      item.className = 'modal-media-item';

      let mediaHtml = '';
      if (m.type === 'image') {
        mediaHtml = `
          <div class="modal-media-wrapper">
            <img src="${m.url}" alt="${escHtml(m.caption||'')}" loading="lazy">
          </div>`;
      } else {
        const vid = `vid-${postId}-${idx}`;
        mediaHtml = `
          <div class="modal-media-wrapper">
            <video id="${vid}" src="${m.url}" playsinline webkit-playsinline muted preload="metadata"></video>
            <div class="video-overlay" id="ov-${vid}" onclick="toggleVideo('${vid}')">
              <div class="play-btn">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              </div>
            </div>
          </div>`;
      }

      const captionHtml = (m.caption || post.location) ? `
        <div class="modal-caption">
          ${m.caption ? `<div class="modal-caption-text">${escHtml(m.caption)}</div>` : ''}
          ${post.location ? `<div class="modal-caption-loc">📍 ${escHtml(post.location)}</div>` : ''}
        </div>` : '';

      item.innerHTML = mediaHtml + captionHtml;
      feed.appendChild(item);
    });

    setupVideoObserver();
  } catch(e) {
    feed.innerHTML = `<div class="status-msg" style="color:#aaa">読み込みに失敗しました<br><small>${e.message}</small></div>`;
    console.error(e);
  }
};

window.closeModal = function() {
  document.getElementById('media-modal').classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('#modal-media-feed video').forEach(v => v.pause());
  if (videoObserver) { videoObserver.disconnect(); videoObserver = null; }
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });

window.toggleVideo = function(vid) {
  const video   = document.getElementById(vid);
  const overlay = document.getElementById('ov-' + vid);
  if (!video) return;
  if (video.paused) {
    video.play();
    overlay.classList.add('hidden');
    video.onended = () => overlay.classList.remove('hidden');
  } else {
    video.pause();
    overlay.classList.remove('hidden');
  }
};

function setupVideoObserver() {
  if (!('IntersectionObserver' in window)) return;
  if (videoObserver) videoObserver.disconnect();
  videoObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const v = e.target;
      if (e.isIntersecting && e.intersectionRatio >= 0.6) {
        v.play().then(() => {
          const ov = document.getElementById('ov-' + v.id);
          if (ov) ov.classList.add('hidden');
        }).catch(() => {});
      } else {
        v.pause();
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('#modal-media-feed video').forEach(v => videoObserver.observe(v));
}

// ===== UTILS =====
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
