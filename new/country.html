<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

<div id="country-wrap" class="country-wrap" style="display:none;">
  <div class="country-header">
    <h1 class="country-title" id="country-title"></h1>
    <p class="country-description" id="country-description"></p>
  </div>
  <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
    <img id="cover-photo" src="" alt="">
  </div>
  <div class="post-chain" id="post-chain"></div>
  <footer class="country-footer">
    <div class="footer-icons">
      <a href="index.html" title="AKIRA travels TOP">
        <img src="images/i_home.gif" alt="AKIRA travels"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>HOME</span>';">
      </a>
      <a href="#" title="PROFILE">
        <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>PROFILE</span>';">
      </a>
      <a href="#" title="Facebook">
        <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>Facebook</span>';">
      </a>
      <a href="#" title="FB Messenger">
        <img src="https://akiratravels.github.io/images/i_fb.png" alt="FB Messenger"
          onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'footer-icon-text\'>Messenger</span>';">
      </a>
    </div>
    <p class="copyright" id="copyright-text"></p>
  </footer>
</div>

<div id="loading-msg" class="loading">読み込み中…</div>
<div id="error-msg" class="error-msg" style="display:none;"></div>

<!-- 詳細モーダル -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sticky-bar">
    <div class="modal-sticky-title" id="modal-title"></div>
    <div class="modal-sticky-meta" id="modal-meta"></div>
  </div>
  <div class="modal-body">
    <div class="modal-caption" id="modal-caption"></div>
    <div id="modal-media-list"></div>
  </div>
  <div class="modal-footer" id="modal-footer"></div>
  <div class="modal-copyright" id="modal-copyright"></div>
</div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import {
  doc, getDoc, getDocs, collection, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 著作権年表示
const yr = new Date().getFullYear();
const copyrightText = `© 1998–${yr} AKIRA travels. All rights reserved.`;
document.getElementById('copyright-text').textContent = copyrightText;

// 管理者リンク
onAuthStateChanged(auth, user => {
  document.getElementById('admin-link-text').textContent = user ? '管理画面' : '管理者';
});

// 状態
let allPosts = [];
let countryName = '';
let currentIdx = 0;
let videoObserver = null;

// ユーティリティ
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function countryFolder(name) {
  return name.toLowerCase().replace(/\s+/g, '-');
}

// ========== 初期化 ==========
async function init() {
  const params = new URLSearchParams(location.search);
  const countryId = params.get('id');

  if (!countryId) {
    showError('国IDが指定されていません。');
    return;
  }

  try {
    // 国情報取得
    const countryDoc = await getDoc(doc(db, 'countries', countryId));
    if (!countryDoc.exists()) {
      showError('指定された国が見つかりません。');
      return;
    }
    const countryData = countryDoc.data();
    countryName = countryData.name || '';

    // タイトル設定
    document.title = `${countryName} — AKIRA travels`;
    document.getElementById('country-title').textContent = countryName;
    document.getElementById('country-description').textContent = countryData.description || '';

    // 投稿取得（全件日付昇順、JSでフィルタ）
    const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')));
    postsSnap.forEach(d => {
      const data = d.data();
      if (data.countryId === countryId) {
        allPosts.push({ id: d.id, ...data });
      }
    });

    // 表示
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('country-wrap').style.display = '';

    renderCoverPhoto();
    renderChain();

  } catch (err) {
    console.error(err);
    showError('データの読み込みに失敗しました。');
  }
}

function showError(msg) {
  document.getElementById('loading-msg').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = '';
}

// ========== 代表写真 ==========
function renderCoverPhoto() {
  let coverMedia = null;

  // 優先1: isCover: true かつ type: "image"
  outer:
  for (const post of allPosts) {
    for (const m of (post.media || [])) {
      if (m.isCover && m.type === 'image') {
        coverMedia = m;
        break outer;
      }
    }
  }

  // 優先2: 最初に見つかったimage
  if (!coverMedia) {
    outer2:
    for (const post of allPosts) {
      for (const m of (post.media || [])) {
        if (m.type === 'image') {
          coverMedia = m;
          break outer2;
        }
      }
    }
  }

  if (coverMedia) {
    const wrap = document.getElementById('cover-photo-wrap');
    const img = document.getElementById('cover-photo');
    img.src = coverMedia.url;
    img.alt = coverMedia.caption || countryName;
    wrap.style.display = '';
    wrap.addEventListener('click', () => openModal(0));
  }
}

// ========== 投稿チェーン ==========
function renderChain() {
  const chain = document.getElementById('post-chain');
  if (allPosts.length === 0) {
    chain.innerHTML = '<p style="color:#aaa;font-size:14px;text-align:center;">投稿がありません。</p>';
    return;
  }

  let html = '';
  allPosts.forEach((post, idx) => {
    const meta = [post.date, post.location].filter(Boolean).join(' · ');
    html += `<div class="chain-item">
      <span class="chain-link" data-idx="${idx}">${escHtml(post.title)}</span>
      ${meta ? `<span class="chain-meta">${escHtml(meta)}</span>` : ''}
    </div>`;
    if (idx < allPosts.length - 1) {
      html += `<div class="chain-item"><span class="chain-arrow">▼</span></div>`;
    }
  });
  chain.innerHTML = html;

  chain.querySelectorAll('.chain-link').forEach(el => {
    el.addEventListener('click', () => openModal(parseInt(el.dataset.idx)));
  });
}

// ========== モーダル ==========
function openModal(idx) {
  currentIdx = idx;
  renderModal(idx);
  const modal = document.getElementById('modal');
  modal.classList.add('open');
  modal.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  history.pushState({ modal: true, idx }, '', location.href);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  stopAllVideos();
  if (videoObserver) {
    videoObserver.disconnect();
    videoObserver = null;
  }
}

window.addEventListener('popstate', () => {
  if (document.getElementById('modal').classList.contains('open')) {
    closeModal();
  }
});

function stopAllVideos() {
  document.querySelectorAll('#modal-media-list video').forEach(v => {
    v.pause();
    v.load();
  });
}

function renderModal(idx) {
  const post = allPosts[idx];
  if (!post) return;

  // Sticky バー
  document.getElementById('modal-title').textContent = post.title || '';
  document.getElementById('modal-meta').textContent =
    [post.date, post.location].filter(Boolean).join(' · ');

  // キャプション
  document.getElementById('modal-caption').textContent = post.caption || '';

  // メディアリスト
  const mediaList = document.getElementById('modal-media-list');
  mediaList.innerHTML = '';
  (post.media || []).forEach(m => {
    const item = document.createElement('div');
    item.className = 'media-item';

    if (m.type === 'video') {
      const vid = document.createElement('video');
      vid.src = m.url;
      vid.playsInline = true;
      vid.controls = false;
      vid.preload = 'metadata';
      vid.addEventListener('click', () => {
        if (vid.paused) {
          stopAllVideos();
          vid.play().catch(() => {});
        } else {
          vid.pause();
        }
      });
      vid.addEventListener('ended', () => {
        vid.load();
      });
      item.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = m.url;
      img.loading = 'lazy';
      img.alt = m.caption || '';
      item.appendChild(img);
    }

    if (m.caption) {
      const cap = document.createElement('div');
      cap.className = 'media-caption';
      cap.textContent = m.caption;
      item.appendChild(cap);
    }

    mediaList.appendChild(item);
  });

  setupVideoAutoplay();
  renderModalFooter(idx);

  // 著作権
  document.getElementById('modal-copyright').textContent = copyrightText;
}

function setupVideoAutoplay() {
  if (videoObserver) {
    videoObserver.disconnect();
    videoObserver = null;
  }

  const videos = document.querySelectorAll('#modal-media-list video');
  if (videos.length === 0) return;

  videoObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const vid = entry.target;
      if (entry.isIntersecting && vid.paused) {
        stopAllVideos();
        vid.play().catch(() => {});
      } else if (!entry.isIntersecting && !vid.paused) {
        vid.pause();
      }
    });
  }, { threshold: 0.6 });

  videos.forEach(v => videoObserver.observe(v));
}

function renderModalFooter(idx) {
  const footer = document.getElementById('modal-footer');
  footer.innerHTML = '';
  const hasNext = idx < allPosts.length - 1;

  // 次へ（より新しい投稿がある場合）
  if (hasNext) {
    const nextImg = document.createElement('img');
    nextImg.src = 'images/i_next.gif';
    nextImg.alt = '次へ';
    nextImg.title = '次へ';
    nextImg.onerror = function() {
      this.style.display = 'none';
      const btn = document.createElement('button');
      btn.className = 'modal-footer-btn';
      btn.textContent = '次へ ▶';
      btn.addEventListener('click', () => navigateModal(idx + 1));
      footer.insertBefore(btn, footer.firstChild);
    };
    nextImg.addEventListener('click', () => navigateModal(idx + 1));
    footer.appendChild(nextImg);
  }

  // AKIRA travels（i_home.gif → トップページへ）
  const homeImg = document.createElement('img');
  homeImg.src = 'images/i_home.gif';
  homeImg.alt = 'AKIRA travels';
  homeImg.title = 'TOP';
  homeImg.onerror = function() {
    this.style.display = 'none';
    const btn = document.createElement('button');
    btn.className = 'modal-footer-btn';
    btn.textContent = '🏠 TOP';
    btn.addEventListener('click', () => { location.href = 'index.html'; });
    footer.appendChild(btn);
  };
  homeImg.addEventListener('click', () => { location.href = 'index.html'; });
  footer.appendChild(homeImg);

  // 前へ（i_last.gif → 国別ページに戻る / 前投稿へ）
  const lastImg = document.createElement('img');
  lastImg.src = 'images/i_last.gif';
  lastImg.alt = '前へ';
  lastImg.title = idx > 0 ? '前へ' : '国別ページへ戻る';
  lastImg.onerror = function() {
    this.style.display = 'none';
    const btn = document.createElement('button');
    btn.className = 'modal-footer-btn';
    btn.textContent = idx > 0 ? '◀ 前へ' : '← 戻る';
    btn.addEventListener('click', () => idx > 0 ? navigateModal(idx - 1) : closeModal());
    footer.appendChild(btn);
  };
  lastImg.addEventListener('click', () => idx > 0 ? navigateModal(idx - 1) : closeModal());
  footer.appendChild(lastImg);
}

function navigateModal(idx) {
  stopAllVideos();
  if (videoObserver) {
    videoObserver.disconnect();
    videoObserver = null;
  }
  currentIdx = idx;
  renderModal(idx);
  document.getElementById('modal').scrollTop = 0;
  history.replaceState({ modal: true, idx }, '', location.href);
}

init();
</script>
</body>
</html>
