<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: scroll; }
  </style>
</head>
<body class="country-page">

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" src="" alt="">
    </div>
    <div class="post-chain" id="post-chain"></div>

    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'; this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="modal-footer-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sticky-bar">
      <div class="modal-sticky-title" id="modal-title"></div>
      <div class="modal-sticky-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body">
      <div class="modal-caption" id="modal-caption"></div>
      <div id="modal-media-list"></div>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
    <div class="modal-copyright" id="modal-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      collection, getDocs, getDoc, doc, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const BASE_IMAGES = 'https://akiratravels.github.io/images/';
    let allPosts = [];
    let currentIdx = 0;
    let ioInstance = null;

    // 著作権
    const yr = new Date().getFullYear();
    document.getElementById('copyright-text').textContent =
      `© 1998–${yr} AKIRA travels. All rights reserved.`;

    async function init() {
      const params = new URLSearchParams(location.search);
      const countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        const [countrySnap, postsSnap] = await Promise.all([
          getDoc(doc(db, 'countries', countryId)),
          getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')))
        ]);

        if (!countrySnap.exists()) {
          showError('指定された国が見つかりません。');
          return;
        }

        const country = { id: countrySnap.id, ...countrySnap.data() };
        document.title = `${country.name} — AKIRA travels`;

        // JS側でフィルタリング
        allPosts = [];
        postsSnap.forEach(d => {
          const p = { id: d.id, ...d.data() };
          if (p.countryId === countryId) allPosts.push(p);
        });

        document.getElementById('country-title').textContent = country.name;
        if (country.description) {
          document.getElementById('country-description').textContent = country.description;
        }

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = '';

        renderCoverPhoto();
        renderChain();

        // URLに post パラメータがあれば該当投稿を開く
        const postParam = params.get('post');
        if (postParam) {
          const idx = allPosts.findIndex(p => p.id === postParam);
          if (idx >= 0) openModal(idx);
        }
      } catch (e) {
        showError('読み込みに失敗しました。');
        console.error(e);
      }
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = '';
    }

    function renderCoverPhoto() {
      let coverMedia = null;
      // 優先1: isCover:true かつ type:"image"
      for (const p of allPosts) {
        const m = (p.media || []).find(m => m.isCover && m.type === 'image');
        if (m) { coverMedia = m; break; }
      }
      // 優先2: 最初のimage
      if (!coverMedia) {
        for (const p of allPosts) {
          const m = (p.media || []).find(m => m.type === 'image');
          if (m) { coverMedia = m; break; }
        }
      }
      if (!coverMedia) return;

      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      img.src = coverMedia.url;
      img.alt = coverMedia.caption || '';
      img.addEventListener('click', () => openModal(0));
      wrap.style.display = '';
    }

    function renderChain() {
      const chain = document.getElementById('post-chain');
      chain.innerHTML = '';
      allPosts.forEach((post, idx) => {
        const item = document.createElement('div');
        item.className = 'chain-item';
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.dataset.idx = idx;
        link.textContent = post.title;
        link.addEventListener('click', () => openModal(idx));
        item.appendChild(link);
        chain.appendChild(item);

        if (idx < allPosts.length - 1) {
          const arrow = document.createElement('div');
          arrow.className = 'chain-item';
          arrow.innerHTML = '<span class="chain-arrow">▼</span>';
          chain.appendChild(arrow);
        }
      });
    }

    /* ─── モーダル ─── */
    function openModal(idx) {
      currentIdx = idx;
      renderModal(idx);
      const modal = document.getElementById('modal');
      modal.classList.add('open');
      modal.scrollTop = 0;
      document.body.style.overflow = 'hidden';
      history.pushState({ modal: true, idx }, '', location.href);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
    }

    window.addEventListener('popstate', () => {
      if (document.getElementById('modal').classList.contains('open')) closeModal();
    });

    function navigateModal(idx) {
      stopAllVideos();
      if (ioInstance) { ioInstance.disconnect(); ioInstance = null; }
      currentIdx = idx;
      renderModal(idx);
      const modal = document.getElementById('modal');
      modal.scrollTop = 0;
      history.replaceState({ modal: true, idx }, '', location.href);
    }

    function renderModal(idx) {
      const post = allPosts[idx];
      if (!post) return;

      // スティッキーバー
      document.getElementById('modal-title').textContent = post.title;
      const metaParts = [post.date, post.location].filter(Boolean);
      document.getElementById('modal-meta').textContent = metaParts.join(' · ');

      // キャプション
      document.getElementById('modal-caption').textContent = post.caption || '';

      // メディアリスト
      const mediaList = document.getElementById('modal-media-list');
      mediaList.innerHTML = '';
      (post.media || []).forEach(m => {
        const item = document.createElement('div');
        item.className = 'media-item';

        if (m.type === 'video') {
          const vid = document.createElement('video');
          vid.playsInline = true;
          vid.controls = false;
          vid.preload = 'metadata';
          vid.src = m.url;
          vid.addEventListener('click', () => {
            if (vid.paused) {
              stopAllVideos();
              vid.play().catch(() => {});
            } else {
              vid.pause();
            }
          });
          vid.addEventListener('ended', () => { vid.load(); });
          item.appendChild(vid);
        } else {
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = m.url;
          img.alt = m.caption || '';
          item.appendChild(img);
        }

        if (m.caption) {
          const cap = document.createElement('div');
          cap.className = 'media-caption';
          cap.textContent = m.caption;
          item.appendChild(cap);
        }

        mediaList.appendChild(item);
      });

      setupVideoAutoplay();
      renderModalFooter(idx);

      // 著作権
      const yr = new Date().getFullYear();
      document.getElementById('modal-copyright').textContent =
        `© 1998–${yr} AKIRA travels. All rights reserved.`;
    }

    function setupVideoAutoplay() {
      const videos = document.getElementById('modal-media-list').querySelectorAll('video');
      if (videos.length === 0) return;
      ioInstance = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const vid = entry.target;
          if (entry.isIntersecting && vid.paused) {
            stopAllVideos();
            vid.play().catch(() => {});
          } else if (!entry.isIntersecting && !vid.paused) {
            vid.pause();
          }
        });
      }, { threshold: 0.6 });
      videos.forEach(v => ioInstance.observe(v));
    }

    function stopAllVideos() {
      document.querySelectorAll('#modal-media-list video').forEach(v => {
        if (!v.paused) v.pause();
      });
    }

    function renderModalFooter(idx) {
      const footer = document.getElementById('modal-footer');
      footer.innerHTML = '';
      const hasNext = idx < allPosts.length - 1;

      function makeImgBtn(src, alt, fallbackText, onClick) {
        const img = document.createElement('img');
        img.src = BASE_IMAGES + src;
        img.alt = alt;
        img.addEventListener('click', onClick);
        img.onerror = function() {
          const btn = document.createElement('button');
          btn.className = 'modal-footer-btn';
          btn.textContent = fallbackText;
          btn.addEventListener('click', onClick);
          img.replaceWith(btn);
        };
        return img;
      }

      if (hasNext) {
        footer.appendChild(makeImgBtn('i_next.gif', '次へ', '次へ', () => navigateModal(idx + 1)));
      }
      footer.appendChild(makeImgBtn('i_home.gif', 'AKIRA travels', '🏠 TOP', () => { location.href = 'index.html'; }));
      footer.appendChild(makeImgBtn('i_last.gif', '前', '前', () => closeModal()));
    }

    init();
  </script>
</body>
</html>
