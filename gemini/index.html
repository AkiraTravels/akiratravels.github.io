<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="admin-link">
    <a href="admin/" id="admin-link-text">管理者</a>
  </div>

  <div class="top-wrap">
    <div class="top-logo">
      <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
    </div>

    <div id="country-list-wrap">
      <div class="loading" id="loading-msg">国データを読み込み中...</div>
    </div>

    <footer class="top-footer">
      <div class="footer-icons">
        <a href="#" title="PROFILE">
          <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="fallback-btn" style="display:none;">👤 PROFILE</button>
        </a>
        <a href="https://www.facebook.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="fallback-btn" style="display:none;">🌐 Facebook</button>
        </a>
        <a href="https://www.messenger.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="fallback-btn" style="display:none;">💬 Messenger</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 著作権年動的設定
    document.getElementById('copyright-text').textContent = `© 1998–${new Date().getFullYear()} AKIRA travels. All rights reserved.`;

    // 管理者リンク制御
    onAuthStateChanged(auth, (user) => {
      const linkText = document.getElementById('admin-link-text');
      if (user) {
        linkText.textContent = '管理画面';
      } else {
        linkText.textContent = '管理者';
      }
    });

    async function init() {
      const wrap = document.getElementById('country-list-wrap');
      try {
        const q = query(collection(db, 'countries'), orderBy('order', 'asc'));
        const snap = await getDocs(q);
        const countries = [];
        snap.forEach(doc => {
          countries.push({ id: doc.id, ...doc.data() });
        });

        if (countries.length === 0) {
          wrap.innerHTML = '<div class="loading">国データがありません。</div>';
          return;
        }

        const table = document.createElement('table');
        let tr = null;

        countries.forEach((country, index) => {
          if (index % 2 === 0) {
            tr = document.createElement('tr');
            table.appendChild(tr);
          }
          const td = buildCountryCell(country);
          tr.appendChild(td);
        });

        if (countries.length % 2 !== 0) {
          const emptyTd = document.createElement('td');
          tr.appendChild(emptyTd);
        }

        wrap.innerHTML = '';
        wrap.appendChild(table);

      } catch (err) {
        console.error(err);
        wrap.innerHTML = '<div class="error-msg">データの読み込みに失敗しました。</div>';
      }
    }

    function buildCountryCell(country) {
      const td = document.createElement('td');
      td.className = 'country-cell';

      let hasLink = false;
      let targetUrl = '';

      if (country.imgUrl) {
        hasLink = true;
        targetUrl = `country.html?id=${country.id}`;
      } else if (country.docUrl) {
        hasLink = true;
        targetUrl = country.docUrl;
      }

      const nameSpan = document.createElement('span');
      nameSpan.className = `country-name-text ${hasLink ? 'has-posts' : 'no-posts'}`;
      nameSpan.textContent = country.name;

      if (hasLink) {
        const a = document.createElement('a');
        a.className = 'country-link';
        a.href = targetUrl;
        if (country.docUrl && !country.imgUrl) {
          a.target = '_blank';
          a.rel = 'noopener';
        }
        a.appendChild(nameSpan);
        td.appendChild(a);
      } else {
        td.appendChild(nameSpan);
      }

      if (country.subtitle) {
        const subSpan = document.createElement('span');
        subSpan.className = 'country-subtitle';
        subSpan.textContent = country.subtitle;
        td.appendChild(subSpan);
      }

      return td;
    }

    init();
  </script>
</body>
</html>
