<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

  <div class="top-wrap">
    <div class="top-logo">
      <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
    </div>
    
    <div id="country-list-wrap">
      <p class="loading">読み込み中…</p>
    </div>
    
    <footer class="shared-footer">
      <div class="footer-icons">
        <a href="#" id="f-link-profile"><img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>PROFILE</span>')"></a>
        <!-- 要件：メールアイコンを削除 -->
        <a href="#" id="f-link-fb"><img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>Facebook</span>')"></a>
        <a href="#" id="f-link-msg"><img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>Messenger</span>')"></a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, user => {
      const linkText = document.getElementById('admin-link-text');
      if (user) {
        linkText.textContent = '管理画面';
      } else {
        linkText.textContent = '管理者';
      }
    });

    const yr = new Date().getFullYear();
    document.getElementById('copyright-text').textContent = `© 1998–${yr} AKIRA travels. All rights reserved.`;

    async function init() {
      const wrap = document.getElementById('country-list-wrap');
      try {
        const [countriesSnap, postsSnap] = await Promise.all([
          getDocs(query(collection(db, 'countries'), orderBy('order', 'asc'))),
          getDocs(collection(db, 'posts'))
        ]);

        const postCount = {};
        postsSnap.forEach(doc => {
          const p = doc.data();
          if (p.countryId) {
            postCount[p.countryId] = (postCount[p.countryId] || 0) + 1;
          }
        });

        const countries = [];
        countriesSnap.forEach(doc => {
          countries.push({ id: doc.id, ...doc.data() });
        });

        if (countries.length === 0) {
          wrap.innerHTML = '<p class="loading">国データがありません。</p>';
          return;
        }

        let tableHtml = '<table class="country-table">';
        for (let i = 0; i < countries.length; i += 2) {
          tableHtml += '<tr>';
          tableHtml += `<td>${renderCell(countries[i], postCount)}</td>`;
          if (i + 1 < countries.length) {
            tableHtml += `<td>${renderCell(countries[i+1], postCount)}</td>`;
          } else {
            tableHtml += '<td></td>';
          }
          tableHtml += '</tr>';
        }
        tableHtml += '</table>';
        wrap.innerHTML = tableHtml;

      } catch (err) {
        console.error(err);
        wrap.innerHTML = `<p class="error-msg">データの取得に失敗しました。</p>`;
      }
    }

    function renderCell(c, postCount) {
      const count = postCount[c.id] || 0;
      const subtitleHtml = c.subtitle ? `<span class="country-subtitle">${c.subtitle}</span>` : '';
      
      if (count > 0) {
        return `
          <div class="country-link-cell">
            <a href="country.html?id=${c.id}" class="has-posts">${c.name}</a>
            ${subtitleHtml}
          </div>
        `;
      } else {
        return `
          <div class="country-link-cell">
            <span class="no-posts">${c.name}</span>
            ${subtitleHtml}
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
