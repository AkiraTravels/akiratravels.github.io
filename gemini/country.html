<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="admin-link"><a href="admin/" id="admin-link-text">管理者</a></div>

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" src="" alt="代表写真">
    </div>
    <div class="post-chain" id="post-chain"></div>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sticky-bar">
      <div class="modal-sticky-title" id="modal-title"></div>
      <div class="modal-sticky-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body">
      <div class="modal-caption" id="modal-caption"></div>
      <div id="modal-media-list"></div>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
    <div class="modal-copyright" id="modal-copyright"></div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { doc, collection, getDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let countryId = '';
    let countryName = '';
    let allPosts = [];
    let observer = null;

    onAuthStateChanged(auth, user => {
      const linkText = document.getElementById('admin-link-text');
      if (user) linkText.textContent = '管理画面';
      else linkText.textContent = '管理者';
    });

    async function init() {
      const params = new URLSearchParams(location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        const countrySnap = await getDoc(doc(db, 'countries', countryId));
        if (!countrySnap.exists()) {
          showError('指定された国が見つかりません。');
          return;
        }
        const countryData = countrySnap.data();
        countryName = countryData.name;
        document.title = `${countryName} — AKIRA travels`;

        document.getElementById('country-title').textContent = countryName;
        document.getElementById('country-description').textContent = countryData.description || '';

        const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')));
        allPosts = [];
        postsSnap.forEach(d => {
          const p = d.data();
          if (p.countryId === countryId) {
            allPosts.push({ id: d.id, ...p });
          }
        });

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto();
        renderChain();

      } catch (err) {
        console.error(err);
        showError('データの読み込みに失敗しました。');
      }
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function renderCoverPhoto() {
      let coverMedia = null;
      // 優先1: isCover: true かつ type: "image"
      for (const p of allPosts) {
        if (p.media && Array.isArray(p.media)) {
          coverMedia = p.media.find(m => m.isCover && m.type === 'image');
          if (coverMedia) break;
        }
      }
      // 優先2: 最初に見つかった type: "image"
      if (!coverMedia) {
        for (const p of allPosts) {
          if (p.media && Array.isArray(p.media)) {
            coverMedia = p.media.find(m => m.type === 'image');
            if (coverMedia) break;
          }
        }
      }

      const wrap = document.getElementById('cover-photo-wrap');
      if (coverMedia && coverMedia.url) {
        const img = document.getElementById('cover-photo');
        img.src = coverMedia.url;
        wrap.style.display = 'block';
        wrap.onclick = () => openModal(0);
      } else {
        wrap.style.display = 'none';
      }
    }

    function renderChain() {
      const container = document.getElementById('post-chain');
      container.innerHTML = '';

      allPosts.forEach((post, idx) => {
        const item = document.createElement('div');
        item.className = 'chain-item';
        
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.dataset.idx = idx;
        link.textContent = post.title;
        link.onclick = () => openModal(idx);
        
        const meta = document.createElement('span');
        meta.className = 'chain-meta';
        meta.textContent = post.location ? `${post.date} · ${post.location}` : post.date;

        item.appendChild(link);
        item.appendChild(meta);
        container.appendChild(item);

        if (idx < allPosts.length - 1) {
          const arrowItem = document.createElement('div');
          arrowItem.className = 'chain-item';
          arrowItem.innerHTML = '<span class="chain-arrow">▼</span>';
          container.appendChild(arrowItem);
        }
      });
    }

    // --- モーダル制御 ---
    window.openModal = function(idx) {
      renderModal(idx);
      const modal = document.getElementById('modal');
      modal.classList.add('open');
      modal.scrollTop = 0;
      document.body.style.overflow = 'hidden';
      history.pushState({ modal: true, idx }, '', location.href);
    }

    window.closeModal = function() {
      const modal = document.getElementById('modal');
      modal.classList.remove('open');
      document.body.style.overflow = '';
      stopAllVideos();
      if (observer) {
        observer.disconnect();
        observer = null;
      }
    }

    window.addEventListener('popstate', e => {
      if (document.getElementById('modal').classList.contains('open')) {
        closeModal();
      }
    });

    function stopAllVideos() {
      const videos = document.querySelectorAll('#modal video');
      videos.forEach(v => v.pause());
    }

    function renderModal(idx) {
      const post = allPosts[idx];
      if (!post) return;

      document.getElementById('modal-title').textContent = post.title;
      document.getElementById('modal-meta').textContent = [post.date, post.location].filter(Boolean).join(' · ');
      
      const captionEl = document.getElementById('modal-caption');
      captionEl.textContent = post.caption || '';

      const mediaList = document.getElementById('modal-media-list');
      mediaList.innerHTML = '';

      if (post.media && Array.isArray(post.media)) {
        post.media.forEach(m => {
          const item = document.createElement('div');
          item.className = 'media-item';

          if (m.type === 'video') {
            const vid = document.createElement('video');
            vid.src = m.url;
            vid.playsInline = true;
            vid.controls = false;
            vid.preload = 'metadata';
            vid.onclick = () => {
              if (vid.paused) {
                stopAllVideos();
                vid.play().catch(() => {});
              } else {
                vid.pause();
              }
            };
            vid.addEventListener('ended', () => {
              vid.load();
            });
            item.appendChild(vid);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.loading = 'lazy';
            item.appendChild(img);
          }

          if (m.caption) {
            const mCap = document.createElement('div');
            mCap.className = 'media-caption';
            mCap.textContent = m.caption;
            item.appendChild(mCap);
          }

          mediaList.appendChild(item);
        });
      }

      setupVideoAutoplay();
      renderModalFooter(idx);
      
      const yr = new Date().getFullYear();
      document.getElementById('modal-copyright').textContent = `© 1998–${yr} AKIRA travels. All rights reserved.`;
    }

    function setupVideoAutoplay() {
      if (observer) observer.disconnect();
      
      observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const vid = entry.target;
          if (entry.isIntersecting && vid.paused) {
            stopAllVideos();
            vid.play().catch(() => {});
          } else if (!entry.isIntersecting && !vid.paused) {
            vid.pause();
          }
        });
      }, { threshold: 0.6 });

      const videos = document.querySelectorAll('#modal video');
      videos.forEach(v => observer.observe(v));
    }

    function renderModalFooter(idx) {
      const footer = document.getElementById('modal-footer');
      footer.innerHTML = '';

      const hasNext = idx < allPosts.length - 1;
      const countryFolder = countryName.toLowerCase().replace(/\s+/g, '-');

      // 1. 次へボタン
      if (hasNext) {
        const nextImg = document.createElement('img');
        nextImg.src = 'https://akiratravels.github.io/images/i_next.gif';
        nextImg.alt = '次へ';
        nextImg.onerror = function() {
          this.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'modal-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateModal(idx + 1);
          footer.insertBefore(btn, nextImg);
        };
        nextImg.onclick = () => navigateModal(idx + 1);
        footer.appendChild(nextImg);
      }

      // 2. 戻るボタン
      const backImg = document.createElement('img');
      backImg.src = `https://akiratravels.github.io/\${countryFolder}/images/i_\${countryFolder}.gif`;
      backImg.alt = '戻る';
      const bindBackFallback = () => {
        backImg.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'modal-footer-btn';
        btn.textContent = '← 戻る';
        btn.onclick = () => closeModal();
        footer.appendChild(btn);
      };
      backImg.onerror = bindBackFallback;
      backImg.onclick = () => closeModal();
      footer.appendChild(backImg);

      // 3. HOMEボタン
      const homeImg = document.createElement('img');
      homeImg.src = 'https://akiratravels.github.io/images/i_home.gif';
      homeImg.alt = 'HOME';
      homeImg.onerror = function() {
        this.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'modal-footer-btn';
        btn.textContent = '🏠 TOP';
        btn.onclick = () => { location.href = 'index.html'; };
        footer.appendChild(btn);
      };
      homeImg.onclick = () => { location.href = 'index.html'; };
      footer.appendChild(homeImg);
    }

    function navigateModal(idx) {
      stopAllVideos();
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      renderModal(idx);
      const modal = document.getElementById('modal');
      modal.scrollTop = 0;
      history.replaceState({ modal: true, idx }, '', location.href);
    }

    init();
  </script>
</body>
</html>
