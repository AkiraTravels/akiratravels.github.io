<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap">
      <img id="cover-photo" alt="代表写真">
    </div>
    <div class="post-chain" id="post-chain"></div>
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="HOME"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                        this.nextElementSibling.onclick=()=>location.href='index.html';">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="detail-view" class="detail-view">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let countryId = null;
    let currentIdx = null;
    let ioInstance = null;

    const copyrightText = `© 1998–${new Date().getFullYear()} AKIRA travels. All rights reserved.`;
    document.getElementById('copyright-text').textContent = copyrightText;
    document.getElementById('detail-copyright').textContent = copyrightText;

    async function init() {
      const params = new URLSearchParams(window.location.search);
      countryId = params.get('id');
      if (!countryId) {
        showError("国IDが指定されていません。");
        return;
      }

      try {
        // 国情報取得
        let country = null;
        const cachedCountry = sessionStorage.getItem(`country_${countryId}`);
        if (cachedCountry) {
          country = JSON.parse(cachedCountry);
        } else {
          const cDoc = await getDoc(doc(db, "countries", countryId));
          if (!cDoc.exists()) {
            showError("指定された国が見つかりません。");
            return;
          }
          country = cDoc.data();
          sessionStorage.setItem(`country_${countryId}`, JSON.stringify(country));
        }

        document.title = `${country.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = country.name;
        document.getElementById('country-description').textContent = country.description || "";

        // 投稿情報取得
        let posts = [];
        const cachedPosts = sessionStorage.getItem(`posts_${countryId}`);
        if (cachedPosts) {
          posts = JSON.parse(cachedPosts);
        } else {
          const q = query(collection(db, "posts"), where("countryId", "==", countryId), orderBy("date", "asc"));
          const snapshot = await getDocs(q);
          snapshot.forEach(pDoc => {
            posts.push({ id: pDoc.id, ...pDoc.data() });
          });
          sessionStorage.setItem(`posts_${countryId}`, JSON.stringify(posts));
        }

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto(country);
        renderChain(posts);

        // POPSTATEイベント設定
        window.addEventListener('popstate', (event) => {
          if (event.state && event.state.detail === true) {
            document.getElementById('country-wrap').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            currentIdx = event.state.idx;
            renderDetail(event.state.idx);
          } else {
            closeDetail(false);
          }
        });

      } catch (err) {
        console.error(err);
        showError("データの読み込みに失敗しました。");
      }
    }

    function renderCoverPhoto(country) {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      if (country.imgUrl) {
        img.src = country.imgUrl;
        wrap.style.display = 'block';
        img.onclick = () => openDetail(0);
      } else {
        wrap.style.display = 'none';
      }
    }

    function renderChain(posts) {
      const container = document.getElementById('post-chain');
      container.innerHTML = "";

      if (posts.length === 0) {
        container.innerHTML = '<p class="loading">投稿がありません</p>';
        return;
      }

      posts.forEach((post, idx) => {
        const item = document.createElement('div');
        item.className = 'chain-item';
        
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(idx);
        item.appendChild(link);
        container.appendChild(item);

        // セパレーター判定
        if (idx < posts.length - 1) {
          const dateA = new Date(post.date);
          const dateB = new Date(posts[idx + 1].date);
          const diffDays = Math.abs(dateB - dateA) / (1000 * 60 * 60 * 24);

          const sepItem = document.createElement('div');
          if (diffDays < 7) {
            sepItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            sepItem.appendChild(arrow);
          } else {
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
          }
          container.appendChild(sepItem);
        }
      });
    }

    function openDetail(idx) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    function closeDetail(pushState = true) {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      if (pushState && window.history.state && window.history.state.detail) {
        history.back();
      }
    }

    function renderDetail(idx) {
      const posts = JSON.parse(sessionStorage.getItem(`posts_${countryId}`)) || [];
      const post = posts[idx];
      if (!post) return;

      document.getElementById('detail-title').textContent = post.title;
      
      const metaArr = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaArr.join(' · ');

      const captionDiv = document.getElementById('detail-caption');
      captionDiv.textContent = post.caption || "";
      captionDiv.style.whiteSpace = "pre-wrap";
      if (post.caption) {
        captionDiv.appendChild(document.createElement('br'));
        captionDiv.appendChild(document.createElement('br'));
      }

      const mediaList = document.getElementById('detail-media-list');
      mediaList.innerHTML = "";

      if (post.media && post.media.length > 0) {
        post.media.forEach(m => {
          const item = document.createElement('div');
          item.className = 'media-item';

          if (m.type === 'video') {
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = "metadata";
            
            // Poster生成ロジック
            if (m.url.includes('upload/')) {
              const parts = m.url.split('upload/');
              const partA = parts[0] + 'upload/';
              const partB = parts[1];
              const fixedB = partB.replace(/\.[^/.]+$/, ".webp");
              video.poster = `${partA}so_0.1/l_play_muwwou/${fixedB}`;
            }

            video.onclick = () => {
              if (video.paused) {
                stopAllVideos();
                video.play();
              } else {
                video.pause();
              }
            };
            video.onended = () => video.load();
            item.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || "";
            img.loading = "lazy";
            item.appendChild(img);
          }

          const cap = document.createElement('div');
          if (m.caption) {
            cap.className = 'media-caption';
            cap.textContent = m.caption;
          } else {
            cap.style.height = '2em';
          }
          item.appendChild(cap);
          mediaList.appendChild(item);
        });
      }

      setupVideoExitPause();
      renderDetailFooter(idx, posts.length);
    }

    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
      }
      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) {
            const video = entry.target;
            if (!video.paused) video.pause();
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    function renderDetailFooter(idx, total) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = "";

      // 次へボタン
      if (idx < total - 1) {
        const nextA = document.createElement('a');
        const nextImg = document.createElement('img');
        nextImg.src = "https://akiratravels.github.io/images/i_next.gif";
        nextImg.alt = "次へ";
        nextImg.onerror = () => {
          nextImg.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ➔';
          btn.onclick = () => navigateDetail(idx + 1);
          nextA.appendChild(btn);
        };
        nextImg.onclick = () => navigateDetail(idx + 1);
        nextA.appendChild(nextImg);
        footer.appendChild(nextA);
      }

      // HOMEボタン
      const homeA = document.createElement('a');
      const homeImg = document.createElement('img');
      homeImg.src = "https://akiratravels.github.io/images/i_home.gif";
      homeImg.alt = "HOME";
      homeImg.onerror = () => {
        homeImg.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 HOME';
        btn.onclick = () => location.href = 'index.html';
        homeA.appendChild(btn);
      };
      homeImg.onclick = () => location.href = 'index.html';
      homeA.appendChild(homeImg);
      footer.appendChild(homeA);

      // 戻るボタン
      const backA = document.createElement('a');
      const backImg = document.createElement('img');
      backImg.src = "https://akiratravels.github.io/images/i_last.gif";
      backImg.alt = "戻る";
      backImg.onerror = () => {
        backImg.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        backA.appendChild(btn);
      };
      backImg.onclick = () => closeDetail();
      backA.appendChild(backImg);
      footer.appendChild(backA);
    }

    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      history.pushState({ detail: true, idx }, '', location.href);
    }

    function stopAllVideos() {
      document.querySelectorAll('#detail-media-list video').forEach(v => {
        v.pause();
        v.currentTime = 0;
      });
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    window.openDetail = openDetail;
    window.closeDetail = closeDetail;
    init();
  </script>
</body>
</html>
