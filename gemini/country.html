<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.country-page { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div class="loading" id="loading-msg">データを読み込み中...</div>
  <div class="error-msg" id="error-msg" style="display:none;"></div>

  <div id="country-view" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" alt="代表写真">
    </div>
    <div class="post-chain" id="post-chain"></div>
    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="HOME" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="fallback-btn" style="display:none;" onclick="location.href='index.html'">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="country-copyright-text"></p>
    </footer>
  </div>

  <div id="detail-view" class="detail-wrap" style="display:none;">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, collection, getDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentCountry = null;
    let allPosts = [];

    const urlParams = new URLSearchParams(window.location.search);
    const countryId = urlParams.get('id');

    async function init() {
      if (!countryId) {
        showError("国IDが指定されていません。");
        return;
      }

      try {
        const [countrySnap, postsSnap] = await Promise.all([
          getDoc(doc(db, 'countries', countryId)),
          getDocs(query(collection(db, 'posts'), where('countryId', '==', countryId), orderBy('date', 'asc')))
        ]);

        if (!countrySnap.exists()) {
          showError("指定された国データが見つかりません。");
          return;
        }

        currentCountry = { id: countrySnap.id, ...countrySnap.data() };
        
        allPosts = [];
        postsSnap.forEach(d => {
          allPosts.push({ id: d.id, ...d.data() });
        });

        try {
          sessionStorage.setItem(`country_${countryId}`, JSON.stringify(currentCountry));
          sessionStorage.setItem(`posts_${countryId}`, JSON.stringify(allPosts));
        } catch (e) {
          console.warn("sessionStorage cache write bypassed:", e);
        }

        document.title = `${currentCountry.name || '国別ページ'} — AKIRA travels`;
        document.getElementById('country-title').textContent = currentCountry.name || '';
        document.getElementById('country-description').textContent = currentCountry.description || '';
        
        const currentYear = new Date().getFullYear();
        document.getElementById('country-copyright-text').textContent = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
        document.getElementById('detail-copyright').textContent = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;

        renderCoverPhoto();
        renderChain();

        window.removeEventListener('hashchange', router);
        window.addEventListener('hashchange', router);
        router();

        document.getElementById('loading-msg').style.display = 'none';

      } catch (err) {
        console.error("Fatal Error:", err);
        showError(`データの取得または処理中にエラーが発生しました: ${err.message || err}`);
      }
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function renderCoverPhoto() {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      
      if (currentCountry && currentCountry.imgUrl && currentCountry.imgUrl.trim() !== '') {
        img.src = currentCountry.imgUrl;
        wrap.style.display = 'block';
        
        if (allPosts && allPosts.length > 0) {
          img.style.cursor = 'pointer';
          img.onclick = () => { window.location.hash = '#post-0'; };
        } else {
          img.style.cursor = 'default';
          img.onclick = null;
        }
      } else {
        wrap.style.display = 'none';
      }
    }

    function renderChain() {
      const container = document.getElementById('post-chain');
      container.innerHTML = '';

      if (!allPosts || allPosts.length === 0) {
        container.innerHTML = '<div class="loading">投稿がありません。</div>';
        return;
      }

      allPosts.forEach((post, i) => {
        const item = document.createElement('div');
        item.className = 'chain-item';

        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title || '無題の投稿';
        link.onclick = () => { window.location.hash = `#post-${i}`; };
        item.appendChild(link);
        container.appendChild(item);

        if (i < allPosts.length - 1) {
          const nextPost = allPosts[i + 1];
          let diffDays = 0;
          
          if (post.date && nextPost.date) {
            const diffTime = Math.abs(new Date(nextPost.date) - new Date(post.date));
            diffDays = diffTime / (1000 * 60 * 60 * 24);
          }

          const sepItem = document.createElement('div');
          if (diffDays >= 7) {
            sepItem.className = 'chain-item chain-separator-wrap';
            sepItem.innerHTML = '<hr class="chain-separator">';
          } else {
            sepItem.className = 'chain-item';
            sepItem.innerHTML = '<span class="chain-arrow">▼</span>';
          }
          container.appendChild(sepItem);
        }
      });
    }

    function router() {
      const hash = window.location.hash;
      const countryView = document.getElementById('country-view');
      const detailView = document.getElementById('detail-view');

      if (hash.startsWith('#post-')) {
        const idx = parseInt(hash.replace('#post-', ''), 10);
        if (!isNaN(idx) && allPosts && idx >= 0 && idx < allPosts.length) {
          countryView.style.display = 'none';
          detailView.style.display = 'block';
          renderDetail(idx);
          window.scrollTo(0, 0);
        } else {
          window.location.hash = '';
        }
      } else {
        detailView.style.display = 'none';
        countryView.style.display = 'block';
        window.scrollTo(0, 0);
      }
    }

    function renderDetail(idx) {
      const post = allPosts[idx];
      if (!post) return;

      document.getElementById('detail-title').textContent = post.title || '';
      const metaParts = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaParts.join(' · ');

      const captionEl = document.getElementById('detail-caption');
      if (post.caption && post.caption.trim() !== '') {
        captionEl.textContent = post.caption;
        captionEl.style.display = '
