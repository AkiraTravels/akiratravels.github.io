<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-attachment: local; }
  </style>
</head>
<body class="country-page">

  <div id="admin-link">
    <a href="admin/" id="admin-link-text">管理者</a>
  </div>

  <div id="country-wrap" class="country-wrap" style="display: none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>

    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display: none;">
      <img id="cover-photo" src="" alt="代表写真">
    </div>

    <div class="post-chain" id="post-chain"></div>

    <footer class="country-footer">
      <div class="footer-icons">
        <a href="index.html" title="AKIRA travels TOP">
          <img src="https://akiratravels.github.io/images/i_home.gif" alt="AKIRA travels"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';
                        this.nextElementSibling.onclick=(e)=>{ e.preventDefault(); location.href='index.html'; }">
          <button class="footer-fallback-btn" style="display:none;">🏠 TOP</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display: none;"></div>

  <div id="detail-view" class="detail-view">
    <div class="detail-sticky-bar">
      <div class="detail-sticky-title" id="detail-title"></div>
      <div class="detail-sticky-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-caption" id="detail-caption"></div>
      <div id="detail-media-list"></div>
    </div>
    <div class="detail-footer" id="detail-footer"></div>
    <div class="detail-copyright" id="detail-copyright"></div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let currentIdx = null;
    let allPosts = [];
    let ioInstance = null;
    let countryId = null;

    // 著作権年の一括設定
    const currentYear = new Date().getFullYear();
    const copyrightStr = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;
    document.getElementById('copyright-text').textContent = copyrightStr;
    document.getElementById('detail-copyright').textContent = copyrightStr;

    // 管理者リンク監視
    onAuthStateChanged(auth, (user) => {
      const linkText = document.getElementById('admin-link-text');
      if (linkText) linkText.textContent = user ? "管理画面" : "管理者";
    });

    // 初期化処理
    async function initPage() {
      const urlParams = new URLSearchParams(window.location.search);
      countryId = urlParams.get('id');

      if (!countryId) {
        showError("国IDが指定されていません。");
        return;
      }

      try {
        // 1. 国データの取得 (セッションキャッシュ優先)
        let countryData = null;
        const cachedCountry = sessionStorage.getItem(`country_${countryId}`);
        if (cachedCountry) {
          countryData = JSON.parse(cachedCountry);
        } else {
          const countryDoc = await getDoc(doc(db, "countries", countryId));
          if (!countryDoc.exists()) {
            showError("指定された国データが見つかりません。");
            return;
          }
          countryData = countryDoc.data();
          sessionStorage.setItem(`country_${countryId}`, JSON.stringify(countryData));
        }

        document.title = `${countryData.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = countryData.name;
        document.getElementById('country-description').textContent = countryData.description || '';

        // 2. 投稿データの取得 (セッションキャッシュ優先)
        const cachedPosts = sessionStorage.getItem(`posts_${countryId}`);
        if (cachedPosts) {
          allPosts = JSON.parse(cachedPosts);
        } else {
          const q = query(
            collection(db, "posts"),
            where("countryId", "==", countryId),
            orderBy("date", "asc")
          );
          const postsSnapshot = await getDocs(q);
          postsSnapshot.forEach(pDoc => {
            allPosts.push({ id: pDoc.id, ...pDoc.data() });
          });
          sessionStorage.setItem(`posts_${countryId}`, JSON.stringify(allPosts));
        }

        // 画面表示切替
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto(countryData);
        renderChain();

        // 履歴初期化用ポップステート監視
        window.addEventListener('popstate', (e) => {
          if (e.state && e.state.detail) {
            openDetail(e.state.idx, false);
          } else {
            closeDetail(false);
          }
        });

      } catch (err) {
        console.error(err);
        showError("データの読み込み中にエラーが発生しました。");
      }
    }

    // 代表写真表示
    function renderCoverPhoto(countryData) {
      const wrap = document.getElementById('cover-photo-wrap');
      const img = document.getElementById('cover-photo');
      if (countryData.imgUrl) {
        img.src = countryData.imgUrl;
        wrap.style.display = 'block';
        img.onclick = () => {
          if (allPosts.length > 0) openDetail(0);
        };
      } else {
        wrap.style.display = 'none';
      }
    }

    // チェーン描画
    function renderChain() {
      const chainWrap = document.getElementById('post-chain');
      chainWrap.innerHTML = '';

      if (allPosts.length === 0) {
        chainWrap.innerHTML = '<div class="loading">投稿がありません</div>';
        return;
      }

      allPosts.forEach((post, idx) => {
        const item = document.createElement('div');
        item.className = 'chain-item';

        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = post.title;
        link.onclick = () => openDetail(idx);
        item.appendChild(link);
        chainWrap.appendChild(item);

        // セパレーター判定（隣接要素がある場合）
        if (idx < allPosts.length - 1) {
          const nextPost = allPosts[idx + 1];
          const dateA = new Date(post.date);
          const dateB = new Date(nextPost.date);
          const diffDays = Math.abs(dateB - dateA) / (1000 * 60 * 60 * 24);

          if (diffDays < 7) {
            const arrowItem = document.createElement('div');
            arrowItem.className = 'chain-item';
            const arrow = document.createElement('span');
            arrow.className = 'chain-arrow';
            arrow.textContent = '▼';
            arrowItem.appendChild(arrow);
            chainWrap.appendChild(arrowItem);
          } else {
            const sepItem = document.createElement('div');
            sepItem.className = 'chain-item chain-separator-wrap';
            const hr = document.createElement('hr');
            hr.className = 'chain-separator';
            sepItem.appendChild(hr);
            chainWrap.appendChild(sepItem);
          }
        }
      });
    }

    // 詳細表示を開く
    window.openDetail = function(idx, pushState = true) {
      currentIdx = idx;
      renderDetail(idx);
      document.getElementById('country-wrap').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);

      if (pushState) {
        window.history.pushState({ detail: true, idx }, '', window.location.href);
      }
    };

    // 詳細表示を閉じる
    window.closeDetail = function(backHistory = true) {
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('country-wrap').style.display = '';
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      if (backHistory && window.history.state && window.history.state.detail) {
        window.history.back();
      }
    };

    // 詳細描画実体
    function renderDetail(idx) {
      const post = allPosts[idx];
      
      // スティッキーバー設定
      document.getElementById('detail-title').textContent = post.title;
      const metaArr = [post.date, post.location].filter(Boolean);
      document.getElementById('detail-meta').textContent = metaArr.join(' · ');

      // キャプション設定
      const captionEl = document.getElementById('detail-caption');
      if (post.caption) {
        captionEl.textContent = post.caption + '\n\n';
        captionEl.style.display = 'block';
      } else {
        captionEl.textContent = '';
        captionEl.style.display = 'none';
      }

      // メディアリスト生成
      const mediaListWrap = document.getElementById('detail-media-list');
      mediaListWrap.innerHTML = '';

      if (post.media && post.media.length > 0) {
        post.media.forEach(m => {
          const mItem = document.createElement('div');
          mItem.className = 'media-item';

          if (m.type === 'video') {
            const video = document.createElement('video');
            video.src = m.url;
            video.playsInline = true;
            video.preload = "metadata";
            
            // Poster 生成ロジック適用
            if (m.url.includes('upload/')) {
              const parts = m.url.split('upload/');
              const partA = parts[0] + 'upload/';
              const partB = parts[1].replace(/\.mp4$/i, '.webp');
              video.poster = `${partA}so_0.2/${partB}`;
            }

            video.onclick = () => {
              if (video.paused) {
                stopAllVideos();
                video.play();
              } else {
                video.pause();
              }
            };

            video.onended = () => {
              video.load();
            };

            mItem.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = m.url;
            img.alt = m.caption || '';
            img.loading = 'lazy';
            mItem.appendChild(img);
          }

          const capDiv = document.createElement('div');
          if (m.caption) {
            capDiv.className = 'media-caption';
            capDiv.textContent = m.caption;
          } else {
            capDiv.style.height = '2em';
          }
          mItem.appendChild(capDiv);
          mediaListWrap.appendChild(mItem);
        });
      }

      setupVideoExitPause();
      renderDetailFooter(idx);
    }

    // 動画自動一時停止監視
    function setupVideoExitPause() {
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }

      const videos = document.querySelectorAll('#detail-media-list video');
      if (videos.length === 0) return;

      ioInstance = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) {
            const video = entry.target;
            if (!video.paused) {
              video.pause();
            }
          }
        });
      }, { threshold: 0.6 });

      videos.forEach(v => ioInstance.observe(v));
    }

    // 詳細フッターナビゲーション
    function renderDetailFooter(idx) {
      const footer = document.getElementById('detail-footer');
      footer.innerHTML = '';

      // 1. 次へボタン
      if (idx < allPosts.length - 1) {
        const nextImg = document.createElement('img');
        nextImg.src = 'https://akiratravels.github.io/images/i_next.gif';
        nextImg.alt = '次へ';
        nextImg.onclick = () => navigateDetail(idx + 1);
        nextImg.onerror = function() {
          this.style.display = 'none';
          const btn = document.createElement('button');
          btn.className = 'detail-footer-btn';
          btn.textContent = '次へ ▶';
          btn.onclick = () => navigateDetail(idx + 1);
          footer.insertBefore(btn, nextImg);
        };
        footer.appendChild(nextImg);
      }

      // 2. HOMEボタン
      const homeImg = document.createElement('img');
      homeImg.src = 'https://akiratravels.github.io/images/i_home.gif';
      homeImg.alt = 'HOME';
      homeImg.onclick = () => location.href = 'index.html';
      homeImg.onerror = function() {
        this.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '🏠 TOP';
        btn.onclick = () => location.href = 'index.html';
        footer.appendChild(btn);
      };
      footer.appendChild(homeImg);

      // 3. 戻るボタン
      const lastImg = document.createElement('img');
      lastImg.src = 'https://akiratravels.github.io/images/i_last.gif';
      lastImg.alt = '戻る';
      lastImg.onclick = () => closeDetail();
      lastImg.onerror = function() {
        this.style.display = 'none';
        const btn = document.createElement('button');
        btn.className = 'detail-footer-btn';
        btn.textContent = '◀ 戻る';
        btn.onclick = () => closeDetail();
        footer.appendChild(btn);
      };
      footer.appendChild(lastImg);
    }

    // 詳細ビュー内遷移
    function navigateDetail(idx) {
      stopAllVideos();
      if (ioInstance) {
        ioInstance.disconnect();
        ioInstance = null;
      }
      currentIdx = idx;
      renderDetail(idx);
      window.scrollTo(0, 0);
      window.history.replaceState({ detail: true, idx }, '', window.location.href);
    }

    // すべてのビデオを停止・初期化
    function stopAllVideos() {
      const videos = document.querySelectorAll('#detail-media-list video');
      videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
      });
    }

    // エラー表示ハンドラ
    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    initPage();
  </script>
</body>
</html>
