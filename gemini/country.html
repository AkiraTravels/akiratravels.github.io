<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 要件：管理画面へのリンクは削除 -->

  <div id="country-wrap" class="country-wrap" style="display:none;">
    <div class="country-header">
      <h1 class="country-title" id="country-title"></h1>
      <p class="country-description" id="country-description"></p>
    </div>
    <div class="cover-photo-wrap" id="cover-photo-wrap" style="display:none;">
      <img id="cover-photo" src="" alt="代表写真">
    </div>
    
    <div class="post-chain" id="post-chain"></div>

    <footer class="shared-footer">
      <div class="footer-icons">
        <!-- 要件：最下段のホームアイコンは他のアイコンと合わせて全体でセンタリング -->
        <a href="index.html"><img src="https://akiratravels.github.io/images/i_home.gif" alt="HOME"></a>
        <a href="#" id="f-link-profile"><img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>PROFILE</span>')"></a>
        <!-- 要件：メールアイコンは削除 -->
        <a href="#" id="f-link-fb"><img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>Facebook</span>')"></a>
        <a href="#" id="f-link-msg"><img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span>Messenger</span>')"></a>
      </div>
      <p class="copyright" id="country-copyright-text"></p>
    </footer>
  </div>

  <div id="loading-msg" class="loading">読み込み中…</div>
  <div id="error-msg" class="error-msg" style="display:none;"></div>

  <!-- 詳細モーダル構造 -->
  <div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sticky-bar">
      <div class="modal-sticky-title" id="modal-title"></div>
      <div class="modal-sticky-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body">
      <div class="modal-caption" id="modal-caption"></div>
      <div id="modal-media-list"></div>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
    <div class="modal-copyright" id="modal-copyright"></div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let countryId = '';
    let countryData = null;
    let allPosts = [];
    let currentIdx = 0;
    let videoObserver = null;

    const yr = new Date().getFullYear();
    document.getElementById('country-copyright-text').textContent = `© 1998–${yr} AKIRA travels. All rights reserved.`;

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      countryId = urlParams.get('id');
      
      if (!countryId) {
        showError('国IDが指定されていません。');
        return;
      }

      try {
        const countryDoc = await getDoc(doc(db, 'countries', countryId));
        if (!countryDoc.exists()) {
          showError('指定された国が見つかりません。');
          return;
        }
        countryData = countryDoc.data();
        document.title = `${countryData.name} — AKIRA travels`;
        document.getElementById('country-title').textContent = countryData.name;
        document.getElementById('country-description').textContent = countryData.description || '';

        const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('date', 'asc')));
        postsSnap.forEach(doc => {
          const p = doc.data();
          if (p.countryId === countryId) {
            allPosts.push({ id: doc.id, ...p });
          }
        });

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('country-wrap').style.display = 'block';

        renderCoverPhoto();
        renderChain();

        window.addEventListener('popstate', e => {
          if (document.getElementById('modal').classList.contains('open')) {
            closeModal(false);
          }
        });

      } catch (err) {
        console.error(err);
        showError('データの取得に失敗しました。');
      }
    }

    function showError(msg) {
      document.getElementById('loading-msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function renderCoverPhoto() {
      let coverMedia = null;
      for (const p of allPosts) {
        if (p.media && Array.isArray(p.media)) {
          coverMedia = p.media.find(m => m.isCover && m.type === 'image');
          if (coverMedia) break;
        }
      }
      if (!coverMedia) {
        for (const p of allPosts) {
          if (p.media && Array.isArray(p.media)) {
            coverMedia = p.media.find(m => m.type === 'image');
            if (coverMedia) break;
          }
        }
      }

      if (coverMedia) {
        const img = document.getElementById('cover-photo');
        img.src = coverMedia.url;
        const wrap = document.getElementById('cover-photo-wrap');
        wrap.style.display = 'block';
        wrap.onclick = () => openModal(0);
      }
    }

    function renderChain() {
      const chainWrap = document.getElementById('post-chain');
      chainWrap.innerHTML = '';

      allPosts.forEach((p, idx) => {
        const item = document.createElement('div');
        item.className = 'chain-item';
        
        const link = document.createElement('span');
        link.className = 'chain-link';
        link.textContent = p.title;
        link.onclick = () => openModal(idx);
        
        const meta = document.createElement('span');
        meta.className = 'chain-meta';
        meta.textContent = p.location ? `${p.date} · ${p.location}` : p.date;
        
        item.appendChild(link);
        item.appendChild(meta);
        chainWrap.appendChild(item);

        if (idx < allPosts.length - 1) {
          const arrowItem = document.createElement('div');
          arrowItem.className = 'chain-item';
          arrowItem.innerHTML = '<span class="chain-arrow">▼</span>';
          chainWrap.appendChild(arrowItem);
        }
      });
    }

    window.openModal = function(idx) {
      currentIdx = idx;
      renderModal(idx);
      document.getElementById('modal').classList.add('open');
      document.getElementById('modal').scrollTop = 0;
      document.body.style.overflow = 'hidden';
      history.pushState({ modal: true, idx }, '', window.location.href);
    };

    function closeModal(doBack = true) {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
      stopAllVideos();
      if (videoObserver) {
        videoObserver.disconnect();
        videoObserver = null;
      }
      if (doBack && window.history.state && window.history.state.modal) {
        window.history.back();
      }
    }

    function stopAllVideos() {
      const videos = document.querySelectorAll('#modal-media-list video');
      videos.forEach(v => v.pause());
    }

    function renderModal(idx) {
      const post = allPosts[idx];
      if (!post) return;

      document.getElementById('modal-title').textContent = post.title;
      document.getElementById('modal-meta').textContent = [post.date, post.location].filter(Boolean).join(' · ');
      
      const captionEl = document.getElementById('modal-caption');
      captionEl.textContent = post.caption || '';

      const mediaList = document.getElementById('modal-media-list');
      mediaList.innerHTML = '';

      if (post.media && Array.isArray(post.media)) {
        post.media.forEach(m => {
          const row = document.createElement('div');
          row.className = 'media-item';

          let el;
          if (m.type === 'video') {
            el = document.createElement('video');
            el.src = m.url;
            el.playsInline = true;
            el.controls = false;
            el.preload = 'metadata';
            el.onclick = () => {
              if (el.paused) {
                stopAllVideos();
                el.play().catch(() => {});
              } else {
                el.pause();
              }
            };
            el.onended = () => { el.load(); };
          } else {
            el = document.createElement('img');
            el.src = m.url;
            el.loading = 'lazy';
          }

          row.appendChild(el);

          if (m.caption) {
            const cap = document.createElement('div');
            cap.className = 'media-caption';
            cap.textContent = m.caption;
            row.appendChild(cap);
          }

          mediaList.appendChild(row);
        });
      }

      setupVideoAutoplay();
      renderModalFooter(idx);
      
      const yr = new Date().getFullYear();
      document.getElementById('modal-copyright').textContent = `© 1998–${yr} AKIRA travels. All rights reserved.`;
    }

    function setupVideoAutoplay() {
      if (videoObserver) videoObserver.disconnect();
      
      videoObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const vid = entry.target;
          if (entry.isIntersecting && vid.paused) {
            stopAllVideos();
            vid.play().catch(() => {});
          } else if (!entry.isIntersecting && !vid.paused) {
            vid.pause();
          }
        });
      }, { threshold: 0.6 });

      const videos = document.querySelectorAll('#modal-media-list video');
      videos.forEach(v => videoObserver.observe(v));
    }

    function renderModalFooter(idx) {
      const footer = document.getElementById('modal-footer');
      footer.innerHTML = '';

      const hasNext = idx < allPosts.length - 1;

      // 1. [next]
      if (hasNext) {
        const btnNext = document.createElement('img');
        btnNext.src = "https://akiratravels.github.io/images/i_next.gif";
        btnNext.alt = "NEXT";
        btnNext.onclick = () => navigateModal(idx + 1);
        footer.appendChild(btnNext);
      } else {
        const spacer = document.createElement('div');
        spacer.style.width = '36px';
        footer.appendChild(spacer);
      }

      // 2. [home] 要件：タップした場合には国別ページではなくトップページ（index.html）へリンク
      const btnHome = document.createElement('img');
      btnHome.src = "https://akiratravels.github.io/images/i_home.gif";
      btnHome.alt = "HOME";
      btnHome.onclick = () => {
        stopAllVideos();
        location.href = 'index.html';
      };
      footer.appendChild(btnHome);

      // 3. [last]
      const btnLast = document.createElement('img');
      btnLast.src = "https://akiratravels.github.io/images/i_last.gif";
      btnLast.alt = "LAST";
      btnLast.onclick = () => closeModal();
      footer.appendChild(btnLast);
    }

    function navigateModal(idx) {
      stopAllVideos();
      if (videoObserver) videoObserver.disconnect();
      currentIdx = idx;
      renderModal(idx);
      document.getElementById('modal').scrollTop = 0;
      history.replaceState({ modal: true, idx }, '', window.location.href);
    }

    init();
  </script>
</body>
</html>
