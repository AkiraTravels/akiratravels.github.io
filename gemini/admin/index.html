<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels — 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header class="admin-header">
    <h1>AKIRA travels<span>ADMIN</span></h1>
    <div id="header-user" style="font-size: 13px; display: none;">
      <span id="user-email" style="color:var(--ink); margin-right:10px;"></span>
      <button id="btn-logout" style="cursor:pointer; font-size:11px;">ログアウト</button>
    </div>
  </header>

  <!-- 未ログイン画面 -->
  <div id="login-screen" class="login-screen" style="display: none;">
    <h2>LOGIN</h2>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="login-email">
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="login-password">
    </div>
    <button id="btn-login" class="primary-btn" style="width: 100%;">ログイン</button>
    <div id="login-error" style="color:#8b2020; font-size:12px; margin-top:10px;"></div>
  </div>

  <!-- ログイン後メインエリア -->
  <div id="admin-main" style="display: none;">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="new-post">✏️ 新規投稿</button>
      <button class="tab-btn" data-tab="post-list">📋 投稿一覧</button>
      <button class="tab-btn" data-tab="country-mgmt">🌍 国管理</button>
    </div>

    <!-- 新規投稿タブ -->
    <div id="tab-new-post" class="tab-panel active">
      <h2 id="form-post-title" style="font-family:var(--font-serif);">新規投稿</h2>
      <div class="form-group">
        <label>国・地域</label>
        <select id="f-country"></select>
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="f-title">
      </div>
      <div class="form-group">
        <label>場所・地名（任意）</label>
        <input type="text" id="f-location">
      </div>
      <div class="form-group">
        <label>投稿の説明（キャプション）</label>
        <textarea id="f-caption" rows="4"></textarea>
      </div>

      <div class="media-section-title">MEDIA</div>
      <div id="media-list"></div>

      <div class="form-actions">
        <button type="button" id="btn-add-media-bottom" class="secondary-btn">☁️ メディアを追加</button>
        <button type="button" id="btn-submit-post" class="primary-btn">投稿する →</button>
        <button type="button" id="btn-cancel-post" class="secondary-btn" style="display: none;">キャンセル</button>
      </div>
    </div>

    <!-- 投稿一覧タブ -->
    <div id="tab-post-list" class="tab-panel">
      <h2 style="font-family:var(--font-serif);">投稿一覧</h2>
      <div id="post-list-container"></div>
    </div>

    <!-- 国管理タブ -->
    <div id="tab-country-mgmt" class="tab-panel">
      <h2 style="font-family:var(--font-serif);">国管理</h2>
      
      <div class="country-form-card" style="background:var(--card-bg); border:1px solid var(--border); padding:20px; margin-bottom:30px;">
        <h3 id="form-country-title" style="margin-top:0; font-family:var(--font-serif);">国の追加</h3>
        <input type="hidden" id="edit-country-id">
        <div class="form-group">
          <label>国名</label>
          <input type="text" id="c-name">
        </div>
        <div class="form-group">
          <label>国旗絵文字</label>
          <input type="text" id="c-flag" maxlength="8">
        </div>
        <div class="form-group">
          <label>表示順</label>
          <input type="number" id="c-order" value="100">
        </div>
        <div class="form-group">
          <label>サブタイトル</label>
          <input type="text" id="c-subtitle">
        </div>
        <div class="form-group">
          <label>紹介文</label>
          <textarea id="c-description" rows="4"></textarea>
        </div>
        <button id="btn-submit-country" class="primary-btn">保存</button>
        <button id="btn-cancel-country" class="secondary-btn" style="display: none;">キャンセル</button>
      </div>

      <div id="country-list-container"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./index.js"></script>
</body>
</html>
