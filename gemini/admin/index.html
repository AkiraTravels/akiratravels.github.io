<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels — 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header class="admin-header">
    <h1>AKIRA travels <span>ADMIN</span></h1>
    <div id="header-user" style="display:none;">
      <span id="user-email"></span>
      <button id="btn-logout">ログアウト</button>
    </div>
  </header>

  <div id="login-screen" class="login-screen">
    <h2>管理者ログイン</h2>
    <input type="email" id="login-email" placeholder="メールアドレス">
    <input type="password" id="login-password" placeholder="パスワード">
    <button id="btn-login">ログイン</button>
    <p id="login-error" style="color:red; font-size:13px; text-align:center;"></p>
  </div>

  <div id="admin-main" style="display:none;">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tab-new-post">✏️ 新規投稿</button>
      <button class="tab-btn" data-tab="tab-post-list">📋 投稿一覧</button>
      <button class="tab-btn" data-tab="tab-country-mgmt">🌍 国管理</button>
    </div>

    <div id="tab-new-post" class="tab-panel active">
      <h3 id="form-title">新規投稿</h3>
      <div class="form-group">
        <label>国・地域</label>
        <select id="f-country"></select>
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="f-title" placeholder="モロッコに到着">
      </div>
      <div class="form-group">
        <label>場所・地名（任意）</label>
        <input type="text" id="f-location" placeholder="カサブランカ">
      </div>
      <div class="form-group">
        <label>投稿の説明</label>
        <textarea id="f-caption" rows="4" placeholder="旅行記の文章を入力…"></textarea>
      </div>

      <h4 class="media-section-title">MEDIA</h4>
      <div id="media-list"></div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" id="btn-add-media-bottom" style="border:1px dashed var(--accent); color:var(--accent);">☁️ メディアを追加</button>
        <div style="flex:1;"></div>
        <button type="button" class="btn-cancel" id="btn-cancel-edit" style="display:none;">キャンセル</button>
        <button type="button" class="btn-submit" id="btn-submit-post">投稿する →</button>
      </div>
    </div>

    <div id="tab-post-list" class="tab-panel">
      <h3>投稿一覧</h3>
      <div id="list-posts"></div>
    </div>

    <div id="tab-country-mgmt" class="tab-panel">
      <h3>国管理</h3>
      <div class="country-form-card" style="border:1px solid var(--border); padding:15px; margin-bottom:20px; background:#fdfdfd;">
        <h4 id="country-form-title" style="margin-top:0;">国の追加</h4>
        <input type="hidden" id="edit-country-id">
        <div class="form-group">
          <label>国名</label>
          <input type="text" id="c-name" placeholder="モロッコ">
        </div>
        <div class="form-group">
          <label>国旗絵文字</label>
          <input type="text" id="c-flag" maxlength="8" placeholder="🇲🇦">
        </div>
        <div class="form-group">
          <label>表示順</label>
          <input type="number" id="c-order" value="100">
        </div>
        <div class="form-group">
          <label>サブタイトル（任意）</label>
          <input type="text" id="c-subtitle" placeholder="サハラ砂漠の国">
        </div>
        <div class="form-group">
          <label>紹介文</label>
          <textarea id="c-description" rows="3" placeholder="国別ページのトップに表示される説明文…"></textarea>
        </div>
        <button type="button" class="btn-submit" id="btn-save-country">保存</button>
        <button type="button" class="btn-cancel" id="btn-cancel-country" style="display:none;">キャンセル</button>
      </div>
      
      <h4>登録済みの国一覧</h4>
      <div id="list-countries"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./index.js"></script>
</body>
</html>
