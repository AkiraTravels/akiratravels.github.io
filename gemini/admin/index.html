<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AKIRA travels - 管理画面</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0d8cf; padding-bottom: 10px; }
    .tab-btn { padding: 10px 20px; background: #f7f3ee; border: 1px solid #e0d8cf; cursor: pointer; font-family: inherit; }
    .tab-btn.active { background: #c4873a; color: #fff; border-color: #c4873a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .preview-card { background: #fff; border: 1px solid #e0d8cf; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #e0d8cf; }
    .preview-media-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    #import-log { background: #1a1410; color: #00ff00; padding: 10px; font-family: monospace; max-height: 150px; overflow-y: auto; margin-top: 15px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>AKIRA travels 管理システム</h1>
    <button id="btn-logout" style="float: right;">ログアウト</button>
  </header>

  <main style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
    <!-- タブナビゲーション -->
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="tab-posts">既存投稿管理</button>
      <button class="tab-btn" data-tab="tab-import">Facebookタイムラインインポート</button>
    </div>

    <!-- タブ1: 既存投稿管理 -->
    <div id="tab-posts" class="tab-content active">
      <h2>投稿一覧・新規登録</h2>
      <div id="existing-posts-list"></div>
    </div>

    <!-- タブ2: Facebookインポート -->
    <div id="tab-import" class="tab-content">
      <h2>🌍 Facebook タイムライン投稿インポート</h2>
      <p style="font-size:14px; color:#666;">FacebookからエクスポートしたJSONからタイムライン投稿を抽出します。画像はCloudinaryへ自動アップロードし、動画はダミー画像に置き換えてキャプションを登録します（アルバムは除外されます）。</p>
      
      <div style="background: #f7f3ee; padding: 20px; border: 1px solid #e0d8cf; margin-bottom: 20px;">
        <label style="display:block; margin-bottom:10px;"><strong>STEP 1: メディアフォルダを選択</strong> (画像ファイルの照合用)</label>
        <input type="file" id="import-media-dir" webkitdirectory directory multiple>
        <span id="media-count-status" style="margin-left:10px; font-weight:bold;"></span>

        <label style="display:block; margin-top:20px; margin-bottom:10px;"><strong>STEP 2: 投稿JSONファイルを選択</strong> (`your_posts__check_ins__photos_and_videos_1.json`など)</label>
        <input type="file" id="import-json-file" accept=".json">
      </div>

      <div id="import-log">システムスタンバイ</div>

      <h3 style="margin-top:20px;">インポート対象候補プレビュー</h3>
      <div id="import-preview-area"></div>
    </div>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
