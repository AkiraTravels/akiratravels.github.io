<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AKIRA travels - 管理画面</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { font-family: sans-serif; background: #fcfaf7; color: #333; margin: 0; padding: 0; }
    header { background: #1a1410; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 20px; color: #e0d8cf; }
    .admin-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    
    /* タブメニュー */
    .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0d8cf; padding-bottom: 10px; }
    .tab-btn { padding: 10px 20px; background: #f7f3ee; border: 1px solid #e0d8cf; cursor: pointer; font-family: inherit; font-weight: bold; color: #665; }
    .tab-btn.active { background: #c4873a; color: #fff; border-color: #c4873a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 各種フォーム・カード */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #e0d8cf; border-radius: 4px; }
    .btn-submit { background: #c4873a; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    
    .post-item { background: #fff; border: 1px solid #e0d8cf; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: flex-start; }
    .preview-card { background: #fff; border: 1px solid #e0d8cf; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #e0d8cf; }
    .preview-media-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    
    #import-log { background: #1a1410; color: #00ff00; padding: 10px; font-family: monospace; max-height: 180px; overflow-y: auto; margin-top: 15px; font-size: 12px; border-radius: 4px; }
    .btn-danger { background: #d9534f; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>AKIRA travels 管理システム</h1>
    <button id="btn-logout" style="padding: 6px 12px; background: #c4873a; color: white; border: none; cursor: pointer;">ログアウト</button>
  </header>

  <div class="admin-container">
    <!-- タブメニュー -->
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="tab-posts">既存投稿管理</button>
      <button class="tab-btn" data-tab="tab-import">Facebookインポート</button>
    </div>

    <!-- タブ1: 既存投稿管理 -->
    <div id="tab-posts" class="tab-content active">
      <div style="background:#fff; border:1px solid #e0d8cf; padding:20px; margin-bottom:30px; border-radius:4px;">
        <h3>✍️ 新規通常投稿の登録</h3>
        <form id="form-new-post">
          <div class="form-group">
            <label>対象の国</label>
            <select id="form-post-country" required><option value="">選択してください</option></select>
          </div>
          <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="form-post-title" placeholder="例: Diliの街を散策" required>
          </div>
          <div class="form-group">
            <label>日付</label>
            <input type="date" id="form-post-date" required>
          </div>
          <div class="form-group">
            <label>詳細な場所 (任意)</label>
            <input type="text" id="form-post-location" placeholder="例: Cristo Rei Beach">
          </div>
          <div class="form-group">
            <label>本文（キャプション）</label>
            <textarea id="form-post-caption" rows="4" placeholder="旅の思い出を記入" required></textarea>
          </div>
          <button type="submit" class="btn-submit">通常投稿を登録</button>
        </form>
      </div>

      <h3>📋 登録済み投稿一覧</h3>
      <div id="existing-posts-list">読み込み中...</div>
    </div>

    <!-- タブ2: Facebookタイムラインインポート -->
    <div id="tab-import" class="tab-content">
      <h2>🌍 Facebook タイムライン投稿インポート</h2>
      <p style="font-size:14px; color:#666; margin-bottom:20px;">
        FacebookからエクスポートしたJSONから通常投稿を抽出します。画像はCloudinaryへ自動アップロードされ、動画はダミー画像（テキスト保持）に自動置換されます（アルバムJSONは除外されます）。
      </p>
      
      <div style="background: #f7f3ee; padding: 20px; border: 1px solid #e0d8cf; margin-bottom: 20px; border-radius:4px;">
        <label style="display:block; margin-bottom:10px;"><strong>STEP 1: メディアフォルダを選択</strong></label>
        <input type="file" id="import-media-dir" webkitdirectory directory multiple>
        <span id="media-count-status" style="margin-left:10px; font-weight:bold; color:#c4873a;"></span>

        <label style="display:block; margin-top:20px; margin-bottom:10px;"><strong>STEP 2: 投稿JSONファイルを選択</strong></label>
        <input type="file" id="import-json-file" accept=".json">
      </div>

      <div id="import-log">システムスタンバイ</div>

      <h3 style="margin-top:25px;">インポート対象候補プレビュー</h3>
      <div id="import-preview-area"></div>
    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
