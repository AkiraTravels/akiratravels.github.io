<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKIRA travels</title>
  <meta property="og:url" content="https://akiratravels.github.io/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="AKIRA travels">
  <meta property="og:site_name" content="AKIRA travels">
  <meta property="og:image" content="https://akiratravels.github.io/images/ogp.jpg">
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="admin-link">
  <a href="admin/" id="admin-link-text">管理者</a>
</div>

<div class="top-wrap">
  <div class="top-logo">
    <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
  </div>

  <div id="country-list-wrap">
    <p class="loading" id="loading-msg">読み込み中…</p>
  </div>

  <footer class="top-footer">
    <div class="footer-icons">
      <a href="#" title="PROFILE">
        <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <button class="detail-footer-btn" style="display:none;">PROFILE</button>
      </a>
      <a href="https://www.facebook.com/" target="_blank" rel="noopener" title="Facebook">
        <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <button class="detail-footer-btn" style="display:none;">Facebook</button>
      </a>
      <a href="https://www.messenger.com/" target="_blank" rel="noopener" title="Messenger">
        <img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <button class="detail-footer-btn" style="display:none;">Messenger</button>
      </a>
    </div>
    <p class="copyright" id="copyright-text"></p>
  </footer>
</div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 著作権表示
document.getElementById('copyright-text').textContent =
  `© 1998–${new Date().getFullYear()} AKIRA travels. All rights reserved.`;

// 認証状態の監視
onAuthStateChanged(auth, user => {
  document.getElementById('admin-link-text').textContent = user ? '管理画面' : '管理者';
});

// 国一覧の取得と描画
async function loadCountries() {
  const wrap = document.getElementById('country-list-wrap');
  try {
    const q = query(collection(db, 'countries'), orderBy('order', 'asc'));
    const snap = await getDocs(q);
    const countries = [];
    snap.forEach(doc => countries.push({ id: doc.id, ...doc.data() }));

    wrap.innerHTML = '';

    if (countries.length === 0) {
      wrap.innerHTML = '<p class="loading">国データがありません</p>';
      return;
    }

    const table = document.createElement('table');
    for (let i = 0; i < countries.length; i += 2) {
      const tr = document.createElement('tr');
      tr.appendChild(buildCountryCell(countries[i]));
      if (i + 1 < countries.length) {
        tr.appendChild(buildCountryCell(countries[i + 1]));
      } else {
        tr.appendChild(document.createElement('td'));
      }
      table.appendChild(tr);
    }
    wrap.appendChild(table);
  } catch (err) {
    wrap.innerHTML = '<p class="error-msg">データの読み込みに失敗しました。</p>';
    console.error(err);
  }
}

function buildCountryCell(c) {
  const td = document.createElement('td');
  td.className = 'country-cell';

  const hasLink = c.imgUrl || c.docUrl;
  const nameSpan = document.createElement('span');
  nameSpan.className = 'country-name-text ' + (hasLink ? 'has-posts' : 'no-posts');
  nameSpan.textContent = c.name;

  if (hasLink) {
    const a = document.createElement('a');
    a.className = 'country-link';
    if (c.imgUrl) {
      a.href = `country.html?id=${c.id}`;
    } else {
      a.href = c.docUrl;
      a.target = '_blank';
      a.rel = 'noopener';
    }
    a.appendChild(nameSpan);
    td.appendChild(a);
  } else {
    td.appendChild(nameSpan);
  }

  if (c.subtitle) {
    const sub = document.createElement('span');
    sub.className = 'country-subtitle';
    sub.textContent = c.subtitle;
    td.appendChild(sub);
  }

  return td;
}

loadCountries();
</script>
</body>
</html>
