<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" CONTENT="湖も、絶壁も、遺跡もいいけどやっぱり人が面白い。人にフォーカスを当てて書き下ろした旅行記と旅日記です。">
  <meta name="keywords" CONTENT="旅行,旅行記,旅日記,一人旅,個人旅行">
  <title>AKIRA travels ～ だから一人旅はやめられない</title>
  
  <meta property="og:url" content="https://akiratravels.github.io/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="AKIRA travels ～ だから一人旅はやめられない">
  <meta property="og:site_name" content="AKIRA travels">
  <meta property="og:image" content="https://akiratravels.github.io/images/ogp.jpg">
  <link rel="shortcut icon" href="https://akiratravels.github.io/images/at.ico">
  
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="admin-link">
    <a href="admin/" id="admin-link-text">管理</a>
  </div>

  <div class="top-wrap">
    <div class="top-logo">
      <img src="https://akiratravels.github.io/images/home.gif" alt="AKIRA travels"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="top-logo-fallback" style="display:none;">AKIRA travels</span>
    </div>

    <div id="country-list-wrap"></div>

    <footer class="top-footer">
      <div class="footer-icons">
        <a href="#" title="PROFILE">
          <img src="https://akiratravels.github.io/images/i_profile.gif" alt="PROFILE"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="footer-fallback-btn" style="display:none;">👤 PROFILE</button>
        </a>
        <a href="https://www.facebook.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/facebook.png" alt="Facebook"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="footer-fallback-btn" style="display:none;">FB</button>
        </a>
        <a href="https://www.messenger.com/" target="_blank" rel="noopener">
          <img src="https://akiratravels.github.io/images/i_fb.png" alt="Messenger"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <button class="footer-fallback-btn" style="display:none;">Messenger</button>
        </a>
      </div>
      <p class="copyright" id="copyright-text"></p>
    </footer>
  </div>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    async function init() {
      // 著作権年度の動的設定
      const currentYear = new Date().getFullYear();
      document.getElementById("copyright-text").textContent = `© 1998–${currentYear} AKIRA travels. All rights reserved.`;

      let countries = [];
      const cached = sessionStorage.getItem("countries_list");

      if (cached) {
        countries = JSON.parse(cached);
      } else {
        try {
          const q = query(collection(db, "countries"), orderBy("order", "asc"));
          const snapshot = await getDocs(q);
          snapshot.forEach(doc => {
            countries.push({ id: doc.id, ...doc.data() });
          });
          sessionStorage.setItem("countries_list", JSON.stringify(countries));
        } catch (err) {
          console.error("データ取得エラー:", err);
        }
      }

      const wrap = document.getElementById("country-list-wrap");
      if (countries.length === 0) {
        wrap.innerHTML = '<p class="loading">国データがありません</p>';
        return;
      }

      const table = document.createElement("table");
      let tr = null;

      countries.forEach((country, idx) => {
        if (idx % 2 === 0) {
          tr = document.createElement("tr");
          table.appendChild(tr);
        }

        const td = buildCountryCell(country);
        tr.appendChild(td);
      });

      if (countries.length % 2 !== 0 && tr) {
        const emptyTd = document.createElement("td");
        tr.appendChild(emptyTd);
      }

      wrap.appendChild(table);
    }

    function buildCountryCell(country) {
      const td = document.createElement("td");
      td.className = "country-cell";

      let linkUrl = "";
      let hasLink = false;

      if (country.imgUrl) {
        linkUrl = `country.html?id=${country.id}`;
        hasLink = true;
      } else if (country.docUrl) {
        linkUrl = country.docUrl;
        hasLink = true;
      }

      const nameSpan = document.createElement("span");
      nameSpan.className = `country-name-text ${hasLink ? 'has-posts' : 'no-posts'}`;
      nameSpan.textContent = country.name;

      if (hasLink) {
        const a = document.createElement("a");
        a.href = linkUrl;
        a.className = "country-link";
        a.appendChild(nameSpan);
        td.appendChild(a);
      } else {
        td.appendChild(nameSpan);
      }

      if (country.subtitle) {
        const subSpan = document.createElement("span");
        subSpan.className = "country-subtitle";
        subSpan.textContent = country.subtitle;
        td.appendChild(subSpan);
      }

      return td;
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
